<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>WARFRAME: STAR PATH</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
:root {
    --bg:#08080f; --panel:#0e0e1a; --border:#c87000; --accent:#00c8ff;
    --text:#d0d0e0; --dim:#505070; --hp:#00e060; --enemy:#ff4040;
    --dmg:#ff8040; --status:#ff40ff;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#000;color:var(--text);font-family:'Press Start 2P',monospace;font-size:8px;
    min-height:100vh;display:flex;justify-content:center;align-items:center;flex-direction:column;gap:0;}
body::after{content:'';position:fixed;inset:0;
    background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.08) 2px,rgba(0,0,0,0.08) 4px);
    pointer-events:none;z-index:9999;}

/* ── Shared wrapper ── */
.screen{width:640px;height:480px;position:relative;overflow:hidden;display:none;flex-direction:column;}
.screen.active{display:flex;}
#game.active{display:flex;}

/* ── STAR CHART SCREEN ── */
#sc-screen{background:var(--bg);border:3px solid var(--border);align-items:center;justify-content:flex-start;}
#sc-title-bar{width:100%;background:#000;border-bottom:2px solid var(--border);padding:7px 12px;
    display:flex;justify-content:space-between;align-items:center;flex-shrink:0;}
#sc-title-bar .t{color:var(--border);font-size:8px;letter-spacing:2px;}
#sc-title-bar .sub{color:var(--dim);font-size:6px;}
#sc-panels-wrap{flex:1;width:100%;display:flex;align-items:center;justify-content:center;padding:12px 16px;gap:0;}
.sc-panel{
    flex:1;height:340px;border:2px solid var(--border);background:var(--panel);
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:10px;cursor:pointer;padding:18px 14px;position:relative;
    transition:background 0.15s,box-shadow 0.15s;
}
.sc-panel:hover{background:#16162a;box-shadow:0 0 20px rgba(200,112,0,0.25);}
.sc-panel.single{max-width:280px;border-color:var(--border);}
.sc-panel .faction-icon{font-size:36px;line-height:1;filter:drop-shadow(0 0 8px currentColor);}
.sc-panel .planet-name{font-size:10px;text-align:center;color:#fff;text-shadow:0 0 8px currentColor;}
.sc-panel .faction-label{font-size:6px;color:var(--dim);letter-spacing:1px;}
.sc-panel .node-label{font-size:6px;color:var(--dim);}
.sc-panel .sc-note{font-size:6px;text-align:center;line-height:2;margin-top:4px;}
.sc-panel .sc-proceed{
    margin-top:12px;background:var(--bg);border:2px solid var(--border);
    color:var(--border);font-family:'Press Start 2P',monospace;font-size:7px;
    padding:7px 14px;cursor:pointer;width:100%;
}
.sc-panel .sc-proceed:hover{background:var(--border);color:#000;}
.sc-divider{
    width:32px;flex-shrink:0;display:flex;flex-direction:column;
    align-items:center;justify-content:center;gap:6px;
}
.sc-divider span{font-size:7px;color:var(--dim);writing-mode:vertical-lr;letter-spacing:3px;}
.sc-divider .sc-or{font-size:9px;color:var(--border);writing-mode:horizontal-tb;}

/* ── FRAME SWITCH SCREEN ── */
#fs-screen{background:var(--bg);border:3px solid var(--border);}
#fs-title{
    width:100%;background:#000;border-bottom:2px solid var(--border);
    padding:7px;text-align:center;font-size:10px;color:var(--border);
    letter-spacing:2px;text-shadow:0 0 10px var(--border);flex-shrink:0;
}
#fs-body{flex:1;display:flex;width:100%;overflow:hidden;}
.fs-side{flex:1;display:flex;flex-direction:column;align-items:center;padding:10px 10px 8px;gap:6px;overflow:hidden;}
.fs-side.right{border-left:2px solid #1a1a2a;}
.fs-frame-name{font-size:9px;text-align:center;padding:3px 8px;border:1px solid currentColor;}
.fs-side.left .fs-frame-name{color:var(--accent);}
.fs-side.right .fs-frame-name{color:var(--enemy);}
.fs-portrait-wrap{position:relative;cursor:pointer;flex-shrink:0;}
.fs-portrait-wrap canvas{display:block;image-rendering:pixelated;}
.fs-hover-btn{
    position:absolute;inset:0;background:rgba(0,0,0,0.72);
    display:flex;align-items:center;justify-content:center;
    opacity:0;transition:opacity 0.18s;
}
.fs-portrait-wrap:hover .fs-hover-btn{opacity:1;}
.fs-hover-btn button{
    background:var(--bg);border:2px solid var(--border);color:var(--border);
    font-family:'Press Start 2P',monospace;font-size:8px;padding:7px 14px;cursor:pointer;
}
.fs-hover-btn button:hover{background:var(--border);color:#000;}
.fs-ab-list{width:100%;display:flex;flex-direction:column;gap:3px;flex:1;overflow:hidden;}
.fs-ab-row{
    width:100%;background:#0a0a14;border:1px solid #252538;
    padding:5px 7px;font-size:6px;color:var(--text);
    display:flex;justify-content:space-between;align-items:center;
    cursor:pointer;transition:background 0.1s,border-color 0.1s;flex-shrink:0;
    position:relative;
}
.fs-ab-row:hover{background:#14142a;border-color:var(--border);}
.fs-ab-row .ab-name{color:var(--text);flex:1;}
.fs-ab-row .ab-cost{color:var(--accent);white-space:nowrap;margin-left:6px;}

/* Tooltip */
#fs-tooltip{
    position:absolute;z-index:600;background:#080814;border:2px solid var(--border);
    padding:8px 10px;font-size:6px;line-height:2.2;color:var(--text);
    pointer-events:none;display:none;max-width:200px;min-width:140px;
}
#fs-tooltip .tt-name{color:var(--border);font-size:7px;margin-bottom:4px;display:block;}
#fs-tooltip .tt-cost{color:var(--accent);margin-bottom:4px;display:block;}
#fs-tooltip .tt-desc{color:var(--dim);margin-bottom:4px;display:block;line-height:2;}
#fs-tooltip .tt-stat{color:var(--dmg);}
#fs-tooltip .tt-fx{color:var(--status);}

/* ── MAIN GAME ── */
#game{background:var(--panel);border:3px solid var(--border);}
#titlebar{
    background:#000;border-bottom:2px solid var(--border);padding:5px 10px;
    display:grid;grid-template-columns:1fr auto 1fr;align-items:center;flex-shrink:0;min-height:34px;
}
#titlebar .title{color:var(--border);font-size:8px;letter-spacing:1px;}
#titlebar .node{color:var(--accent);font-size:6px;text-align:right;}
#enc-strip{display:flex;align-items:center;justify-content:center;}
.enc-slot{position:relative;width:22px;height:22px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.enc-icon{font-size:11px;line-height:1;color:#2a2a45;transition:color .25s,text-shadow .25s;display:block;user-select:none;}
.enc-slot.current .enc-icon{color:#fff;text-shadow:0 0 6px #fff,0 0 14px var(--accent);}
.enc-slot.done .enc-icon{color:#1e1e32;}
.enc-x{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
    font-size:15px;color:#bb0808;pointer-events:none;opacity:0;transition:opacity .2s;
    text-shadow:0 0 3px #f00;line-height:1;}
.enc-slot.done .enc-x{opacity:1;}
.enc-line{width:7px;height:2px;background:#1e1e32;flex-shrink:0;transition:background .25s;}
.enc-line.passed{background:#404060;}

/* Junction strip indicator */
#junction-label{
    font-size:6px;color:var(--status);border:1px solid var(--status);padding:2px 8px;
    text-align:center;
}

#enemy-area{
    flex:1;display:flex;align-items:center;justify-content:center;padding:10px 16px;
    gap:20px;border-bottom:2px solid #1a1a2a;
    background:linear-gradient(180deg,#08080f 0%,#0e0e1a 100%);position:relative;
}
#enemy-sprite{width:80px;height:80px;flex-shrink:0;image-rendering:pixelated;}
#enemy-info{flex:1;}
#enemy-name{color:var(--enemy);font-size:9px;margin-bottom:8px;text-shadow:0 0 8px var(--enemy);}
#enemy-status{color:var(--status);font-size:6px;margin-bottom:6px;min-height:12px;line-height:2;}
.bar-group{margin-bottom:6px;}
.bar-label{font-size:6px;color:var(--dim);margin-bottom:3px;}
.bar-outer{height:10px;background:#0a0a14;border:1px solid #2a2a3a;overflow:hidden;}
.bar-inner{height:100%;transition:width .3s;position:relative;}
.bar-inner::after{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:rgba(255,255,255,0.18);}
.bar-hp .bar-inner{background:var(--hp);box-shadow:0 0 6px var(--hp);}
.bar-ehp .bar-inner{background:var(--enemy);box-shadow:0 0 6px var(--enemy);}
.bar-energy .bar-inner{background:var(--energy,var(--accent));box-shadow:0 0 6px var(--accent);}
.bar-value{font-size:6px;color:var(--dim);margin-top:2px;}
#turn-indicator{position:absolute;top:6px;right:8px;font-size:7px;padding:3px 7px;
    background:var(--bg);border:1px solid var(--border);color:var(--accent);transition:all .2s;}
#turn-indicator.enemy{color:var(--enemy);border-color:var(--enemy);}
#enc-type-label{position:absolute;top:6px;left:8px;font-size:6px;padding:3px 7px;
    background:var(--bg);border:1px solid var(--dim);color:var(--dim);}
#enc-type-label.boss-lbl{color:var(--enemy);border-color:var(--enemy);}
#enc-type-label.spec-lbl{color:var(--status);border-color:var(--status);}
#enc-type-label.junc-lbl{color:var(--status);border-color:var(--status);}
#enemy-action{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);font-size:7px;
    color:var(--enemy);background:rgba(8,8,15,.85);border:1px solid var(--enemy);
    padding:3px 10px;white-space:nowrap;opacity:0;transition:opacity .25s;pointer-events:none;}
#enemy-action.show{opacity:1;}

#log-area{height:80px;overflow-y:auto;padding:6px 10px;background:var(--bg);
    border-bottom:2px solid #1a1a2a;flex-shrink:0;
    scrollbar-width:thin;scrollbar-color:var(--border) transparent;}
.log-entry{font-size:7px;line-height:2.1;}
.log-player{color:var(--accent);}
.log-enemy{color:var(--enemy);}
.log-system{color:var(--border);}
.log-damage{color:var(--dmg);}
.log-status{color:var(--status);}

#player-area{padding:8px 10px 10px;flex-shrink:0;}
#player-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
#frame-name{color:var(--accent);font-size:9px;text-shadow:0 0 8px var(--accent);}
#player-status{color:var(--status);font-size:6px;max-width:300px;text-align:right;line-height:2;}
#player-bars{display:flex;gap:16px;margin-bottom:8px;}
#player-bars .bar-group{flex:1;}
#actions{display:flex;flex-wrap:wrap;gap:4px;}
.btn{background:var(--bg);border:2px solid var(--border);color:var(--text);
    font-family:'Press Start 2P',monospace;font-size:6px;padding:5px 6px;cursor:pointer;
    line-height:1.6;flex:1;min-width:90px;text-align:center;transition:background .1s,color .1s,box-shadow .1s;}
.btn:hover:not(:disabled){background:var(--border);color:#000;box-shadow:0 0 8px var(--border);}
.btn:active:not(:disabled){transform:translateY(1px);}
.btn:disabled{opacity:.28;cursor:not-allowed;border-color:#2a2a3a;}
.btn.ability{border-color:var(--accent);}
.btn.ability:hover:not(:disabled){background:var(--accent);color:#000;box-shadow:0 0 8px var(--accent);}
.btn.end{border-color:var(--dim);flex:0 0 auto;min-width:auto;padding:5px 12px;color:var(--dim);}
.btn.end:hover:not(:disabled){background:var(--dim);color:#000;box-shadow:none;}
.btn.end.urgent{border-color:var(--border);color:var(--border);animation:pulse-end 1s ease-in-out infinite;}
.btn.end.urgent:hover:not(:disabled){background:var(--border);color:#000;}
@keyframes pulse-end{0%,100%{box-shadow:0 0 6px var(--border);}50%{box-shadow:0 0 14px var(--border),0 0 28px rgba(200,112,0,.4);}}

.dmg-popup{position:absolute;font-size:11px;pointer-events:none;animation:floatUp .9s ease-out forwards;z-index:200;text-shadow:2px 2px 0 #000;}
@keyframes floatUp{0%{opacity:1;transform:translateY(0);}100%{opacity:0;transform:translateY(-36px);}}
@keyframes flashRed{0%,100%{filter:none}40%{filter:brightness(2) sepia(1) hue-rotate(300deg)}}
@keyframes flashBlue{0%,100%{filter:none}40%{filter:brightness(2.5) saturate(3) hue-rotate(160deg)}}
.flash-hit{animation:flashRed .3s;}
.flash-ability{animation:flashBlue .3s;}

/* ── Special screen (inside #game) ── */
#special-screen{
    display:none;position:absolute;inset:0;background:var(--bg);
    flex-direction:column;align-items:center;justify-content:center;z-index:300;gap:0;padding:24px;
}
#special-screen.active{display:flex;}
#special-screen .spec-tag{font-size:6px;color:var(--status);border:1px solid var(--status);padding:3px 10px;margin-bottom:16px;letter-spacing:2px;}
#special-screen h2{font-size:13px;color:var(--status);text-shadow:0 0 14px var(--status);margin-bottom:18px;text-align:center;}
#special-screen .spec-desc{font-size:7px;color:var(--text);line-height:2.6;text-align:center;margin-bottom:18px;}
#special-screen .spec-reward{font-size:7px;color:var(--accent);line-height:2.4;text-align:center;
    padding:10px 16px;border:1px solid var(--accent);margin-bottom:22px;}
#special-screen .spec-reward::before{content:'REWARD';display:block;font-size:6px;color:var(--dim);margin-bottom:6px;}

/* ── Generic overlays ── */
.overlay{position:absolute;inset:0;background:rgba(8,8,15,.93);display:flex;flex-direction:column;
    align-items:center;justify-content:center;z-index:500;}
.overlay h2{font-size:13px;margin-bottom:14px;}
.overlay.win h2{color:var(--border);text-shadow:0 0 14px var(--border);}
.overlay.lose h2{color:var(--enemy);text-shadow:0 0 14px var(--enemy);}
.overlay p{font-size:7px;color:var(--dim);line-height:2.4;text-align:center;margin-bottom:4px;}
.obtn{background:var(--bg);border:2px solid var(--border);color:var(--border);
    font-family:'Press Start 2P',monospace;font-size:8px;padding:8px 18px;cursor:pointer;margin-top:10px;}
.obtn:hover{background:var(--border);color:#000;}
.obtn.acc{border-color:var(--accent);color:var(--accent);}
.obtn.acc:hover{background:var(--accent);color:#000;}
</style>
</head>
<body>

<!-- STAR CHART SCREEN -->
<div id="sc-screen" class="screen">
    <div id="sc-title-bar">
        <span class="t">NAVIGATION CONSOLE</span>
        <span class="sub" id="sc-sub">Choose your destination, Tenno</span>
    </div>
    <div id="sc-panels-wrap"></div>
</div>

<!-- FRAME SWITCH SCREEN -->
<div id="fs-screen" class="screen">
    <div id="fs-title">SWITCH WARFRAMES?</div>
    <div id="fs-body">
        <div class="fs-side left" id="fs-left">
            <div class="fs-frame-name" id="fs-cur-name">EXCALIBUR</div>
            <div class="fs-portrait-wrap" id="fs-cur-portrait">
                <canvas id="fs-cur-canvas" width="100" height="120"></canvas>
                <div class="fs-hover-btn"><button id="btn-keep">KEEP</button></div>
            </div>
            <div class="fs-ab-list" id="fs-cur-abs"></div>
        </div>
        <div class="fs-side right" id="fs-right">
            <div class="fs-frame-name" id="fs-new-name">LOKI</div>
            <div class="fs-portrait-wrap" id="fs-new-portrait">
                <canvas id="fs-new-canvas" width="100" height="120"></canvas>
                <div class="fs-hover-btn"><button id="btn-switch">SWITCH</button></div>
            </div>
            <div class="fs-ab-list" id="fs-new-abs"></div>
        </div>
    </div>
    <div id="fs-tooltip"></div>
</div>

<!-- MAIN GAME -->
<div id="game" class="screen active">
    <div id="special-screen">
        <div class="spec-tag">? SPECIAL ENCOUNTER</div>
        <h2 id="spec-title">—</h2>
        <div class="spec-desc" id="spec-desc"></div>
        <div class="spec-reward" id="spec-reward"></div>
        <button class="obtn acc" id="spec-continue">CONTINUE ▶</button>
    </div>
    <div id="titlebar">
        <span class="title">WARFRAME: STAR PATH</span>
        <div id="enc-strip"></div>
        <span class="node" id="node-label">EARTH // E PRIME</span>
    </div>
    <div id="enemy-area">
        <div id="enc-type-label">COMBAT</div>
        <div id="turn-indicator">PLAYER TURN</div>
        <canvas id="enemy-sprite" width="80" height="80"></canvas>
        <div id="enemy-info">
            <div id="enemy-name">—</div>
            <div id="enemy-status"></div>
            <div class="bar-group bar-ehp">
                <div class="bar-label">HEALTH</div>
                <div class="bar-outer"><div class="bar-inner" id="enemy-hp-bar" style="width:100%"></div></div>
                <div class="bar-value" id="enemy-hp-val">— / —</div>
            </div>
        </div>
        <div id="enemy-action"></div>
    </div>
    <div id="log-area"></div>
    <div id="player-area">
        <div id="player-header">
            <span id="frame-name">EXCALIBUR</span>
            <span id="player-status"></span>
        </div>
        <div id="player-bars">
            <div class="bar-group bar-hp">
                <div class="bar-label">HEALTH</div>
                <div class="bar-outer"><div class="bar-inner" id="player-hp-bar" style="width:100%"></div></div>
                <div class="bar-value" id="player-hp-val">150 / 150</div>
            </div>
            <div class="bar-group bar-energy">
                <div class="bar-label">ENERGY  [ ACTION POINTS ]</div>
                <div class="bar-outer"><div class="bar-inner" id="player-en-bar" style="width:100%"></div></div>
                <div class="bar-value" id="player-en-val">8 / 8</div>
            </div>
        </div>
        <div id="actions">
            <button class="btn" id="btn-atk" onclick="act('atk')">⚔ ATTACK<br>[1 AP]</button>
            <button class="btn ability" id="btn-s1" onclick="act('s1')">—</button>
            <button class="btn ability" id="btn-s2" onclick="act('s2')">—</button>
            <button class="btn ability" id="btn-s3" onclick="act('s3')">—</button>
            <button class="btn ability" id="btn-s4" onclick="act('s4')">—</button>
            <button class="btn end" id="btn-end" onclick="endTurn()">END TURN ▶</button>
        </div>
    </div>
</div>

<script>
/* ================================================================
   FACTIONS
================================================================ */
const FACTIONS = {
    GRINEER:  { color:'#c87000', icon:'⚙',  dim:'#4a2800' },
    CORPUS:   { color:'#00c8ff', icon:'◈',  dim:'#004060' },
    INFESTED: { color:'#40e040', icon:'☣',  dim:'#104010' },
    CORRUPTED:{ color:'#cc44ff', icon:'⚡', dim:'#440055' },
    MURMUR:   { color:'#a090e0', icon:'◇',  dim:'#302050' },
};

   FRAMES  (ability stat data used for tooltips + button labels)
================================================================ */

            s2:{name:'GRASP OF LOHK', cost:2, desc:'Fire stolen guns at the enemy. Deals damage and restores 2 AP.',       dmg:[18,26],dmgType:'PHYSICAL',pierce:false,special:'Restores 2 AP on hit'},

    },
    saryn:{
        name:'SARYN', maxHp:175, maxEnergy:8,
        abilities:{

        energy:f.maxEnergy, maxEnergy:f.maxEnergy,

function genEncounters(){
    return [
        {type:'combat'},{type:'combat'},{type:'combat'},{type:'combat'},
        {type:'special'},
        {type:'boss'},
    ];
}

function buildEnemy(){
    const enc=G.encounters[G.encIdx], pl=PLANETS[G.currentPlanet];
    if(enc.type==='boss'){
        const b=pl.boss;
        return { ...JSON.parse(JSON.stringify(b)), hp:b.maxHp,
                 def:G.p.debuffEnemy?Math.max(0,b.def-0.10):b.def,
                 fx:[], bracing:false, blindLeft:0,
                 hasDecoy:false, decoyTurns:0, invisible:false, invisTurns:0,
                 atkDebuff:0, atkDebuffTurns:0, poisonTurns:0, poisonDmg:0 };
    }
    const keys=pl.enemies;
    const tmpl=ENEMY_TYPES[keys[Math.floor(Math.random()*keys.length)]];
    return { ...JSON.parse(JSON.stringify(tmpl)), hp:tmpl.maxHp,
             def:G.p.debuffEnemy?Math.max(0,tmpl.def-0.10):tmpl.def,
             fx:[], bracing:false, blindLeft:0,
             hasDecoy:false, decoyTurns:0, invisible:false, invisTurns:0,
             atkDebuff:0, atkDebuffTurns:0, poisonTurns:0, poisonDmg:0 };
}

function buildJunctionEnemy(junctionKey){
    const tmpl=JUNCTION_ENEMIES[junctionKey];
    return { ...JSON.parse(JSON.stringify(tmpl)), hp:tmpl.maxHp,
             fx:[], bracing:false, blindLeft:0,
             hasDecoy:false, decoyTurns:0, invisible:false, invisTurns:0,
             atkDebuff:0, atkDebuffTurns:0, poisonTurns:0, poisonDmg:0 };
}

/* ================================================================
   SCREEN MANAGEMENT
================================================================ */
function showScreen(id){
    ['sc-screen','fs-screen','game'].forEach(s=>{
        const el=document.getElementById(s);
        if(s===id){ el.style.display='flex'; }
        else { el.style.display='none'; }
    });
}

/* ================================================================
   STAR CHART
================================================================ */
function showStarChart(nextNodes){
    showScreen('sc-screen');
    const wrap=document.getElementById('sc-panels-wrap');
    wrap.innerHTML='';

    if(nextNodes.length===1){
        // Single panel — centered
        const node=nextNodes[0];
        wrap.style.justifyContent='center';
        const panel=makePlanetPanel(node, true);
        wrap.appendChild(panel);
    } else {
        // Two panels with divider
        wrap.style.justifyContent='center';
        const left=makePlanetPanel(nextNodes[0], false);
        const right=makePlanetPanel(nextNodes[1], false);
        const div=document.createElement('div'); div.className='sc-divider';
        div.innerHTML=`<span class="sc-or">OR</span>`;
        wrap.appendChild(left); wrap.appendChild(div); wrap.appendChild(right);
    }
}

function makePlanetPanel(node, single){
    const isJunction = node.type==='junction';
    const jData = isJunction ? JUNCTIONS[node.id] : null;
    const pData = isJunction ? null : PLANETS[node.id];
    const faction = isJunction ? jData.faction : pData.faction;
    const fac = FACTIONS[faction];
    const label = isJunction ? jData.name : pData.name;
    const sublabel = isJunction ? `Warframe junction — ${FRAMES[jData.frame].name}` : `${faction} TERRITORY`;
    const nodeLabel = isJunction ? '' : `NODE: ${pData.node}`;

    const panel=document.createElement('div');
    panel.className='sc-panel'+(single?' single':'');
    panel.style.borderColor=fac.color;
    panel.style.setProperty('--fac-color',fac.color);

    panel.innerHTML=`
        <div class="faction-icon" style="color:${fac.color}">${fac.icon}</div>
        <div class="planet-name" style="color:${fac.color}">${label}</div>
        <div class="faction-label">${faction}</div>
        ${nodeLabel?`<div class="node-label">${nodeLabel}</div>`:''}
        <div class="sc-note" style="color:${fac.color};opacity:0.7">${sublabel}</div>
        <button class="sc-proceed" style="border-color:${fac.color};color:${fac.color}">${isJunction?'FIGHT JUNCTION ▶':'PROCEED ▶'}</button>
    `;

    panel.querySelector('.sc-proceed').addEventListener('click', ()=>{
        if(isJunction) startJunctionFight(node.id);
        else           startPlanet(node.id);
    });
    return panel;
}

/* ================================================================
   PLANET + JUNCTION FLOW
================================================================ */
function startPlanet(planetKey){
    G.currentPlanet=planetKey;
    G.mode='planet';
    G.encounters=genEncounters();
    G.encIdx=0;
    G.p.energy=G.p.maxEnergy; // restore energy at planet start
    G.p.debuffEnemy=false;
    const pl=PLANETS[planetKey];
    document.getElementById('node-label').textContent=`${pl.name} // ${pl.node}`;
    showScreen('game');
    document.getElementById('log-area').innerHTML='';
    startEncounter();
}

function startJunctionFight(junctionKey){
    G.currentJunction=junctionKey;
    G.mode='junction';
    G.e=buildJunctionEnemy(junctionKey);
    G.whose='player'; G.phase='combat'; G.turn=1;
    G.p.energy=G.p.maxEnergy;

    const jData=JUNCTIONS[junctionKey];
    document.getElementById('node-label').textContent=jData.name;

    // Update enc-strip with single junction slot
    const strip=document.getElementById('enc-strip');
    strip.innerHTML='<div style="font-size:6px;color:var(--status);letter-spacing:1px;">JUNCTION FIGHT</div>';

    const lbl=document.getElementById('enc-type-label');
    lbl.textContent='⚡ JUNCTION'; lbl.className='junc-lbl';

    showScreen('game');
    document.getElementById('log-area').innerHTML='';
    log('log-system','══════════════════════════════');
    log('log-system',`JUNCTION FIGHT: ${FRAMES[jData.frame].name.toUpperCase()}`);
    log('log-system',`Defeat this Warframe to unlock it.`);
    log('log-system','══════════════════════════════');

    renderActionButtons();
    drawSprite(G.e.sprite);
    render(); updateTurnBadge();
    setButtons(true);
}

function onJunctionWin(){
    G.phase='over';
    // Restore HP on junction completion
    G.p.hp=G.p.maxHp;
    showFrameSwitch(G.currentJunction);
}

/* ================================================================
   FRAME SWITCH SCREEN
================================================================ */
function showFrameSwitch(junctionKey){
    const jData=JUNCTIONS[junctionKey];
    const curFrameKey=G.currentFrame;
    const newFrameKey=jData.frame;
    const curFrame=FRAMES[curFrameKey];
    const newFrame=FRAMES[newFrameKey];

    // Populate names
    document.getElementById('fs-cur-name').textContent=curFrame.name;
    document.getElementById('fs-new-name').textContent=newFrame.name;
    document.getElementById('fs-cur-name').style.color='var(--accent)';
    document.getElementById('fs-new-name').style.color='var(--enemy)';

    // Draw portraits
    drawPortrait(document.getElementById('fs-cur-canvas'), curFrameKey);
    drawPortrait(document.getElementById('fs-new-canvas'), newFrameKey);

    // Populate ability lists
    buildAbilityList(document.getElementById('fs-cur-abs'), curFrameKey, 'left');
    buildAbilityList(document.getElementById('fs-new-abs'), newFrameKey, 'right');

    // Keep button
    document.getElementById('btn-keep').onclick=()=>{
        // Keep current frame; HP already restored
        afterFrameSwitch();
    };

    // Switch button
    document.getElementById('btn-switch').onclick=()=>{
        G.currentFrame=newFrameKey;
        // Adjust HP proportionally for new frame's max
        G.p.maxHp=newFrame.maxHp;
        G.p.hp=newFrame.maxHp; // full HP for new frame
        G.p.maxEnergy=newFrame.maxEnergy;
        G.p.energy=newFrame.maxEnergy;
        afterFrameSwitch();
    };

    showScreen('fs-screen');
}

function afterFrameSwitch(){
    // Hide tooltip
    document.getElementById('fs-tooltip').style.display='none';
    // Navigate to the planet the junction leads to
    const jData=JUNCTIONS[G.currentJunction];
    showStarChart([{type:'planet', id:jData.leadsTo}]);
}

function buildAbilityList(container, frameKey, side){
    container.innerHTML='';
    const frame=FRAMES[frameKey];
    ['s1','s2','s3','s4'].forEach((slot,i)=>{
        const ab=frame.abilities[slot];
        const row=document.createElement('div');
        row.className='fs-ab-row';
        row.innerHTML=`<span class="ab-name">${['①','②','③','④'][i]} ${ab.name}</span><span class="ab-cost">[${ab.cost} AP]</span>`;
        row.addEventListener('mouseenter', e=>showTooltip(ab, e.currentTarget, side));
        row.addEventListener('mouseleave', ()=>hideTooltip());
        container.appendChild(row);
    });
}

function showTooltip(ab, el, side){
    const tt=document.getElementById('fs-tooltip');
    let html=`<span class="tt-name">${ab.name}</span>`;
    html+=`<span class="tt-cost">Cost: ${ab.cost} AP</span>`;
    html+=`<span class="tt-desc">${ab.desc}</span>`;
    if(ab.dmg) html+=`<span class="tt-stat">Damage: ${ab.dmg[0]}-${ab.dmg[1]} ${ab.dmgType}</span><br>`;
    if(ab.pierce) html+=`<span class="tt-stat">Armor pierce: YES</span><br>`;
    if(ab.special) html+=`<span class="tt-fx">${ab.special}</span><br>`;
    if(ab.effects) ab.effects.forEach(fx=>{
        html+=`<span class="tt-fx">${fx.name}: ${fx.dur} turn${fx.dur>1?'s':''}${fx.note?' ('+fx.note+')':''}</span><br>`;
    });
    tt.innerHTML=html; tt.style.display='block';

    const rect=el.getBoundingClientRect();
    const gameRect=document.getElementById('fs-screen').getBoundingClientRect();
    const top=rect.top-gameRect.top;
    if(side==='left'){
        tt.style.left=(rect.right-gameRect.left+6)+'px';
    } else {
        tt.style.left=(rect.left-gameRect.left-210)+'px';
    }
    tt.style.top=top+'px';
}

function hideTooltip(){
    document.getElementById('fs-tooltip').style.display='none';
}

   ENCOUNTER STRIP + START ENCOUNTER

function renderStrip(){
    if(G.mode==='junction') return; // strip is handled separately
    const strip=document.getElementById('enc-strip');
    strip.innerHTML='';
    const pl=PLANETS[G.currentPlanet];
    const fac=FACTIONS[pl.faction];

function startEncounter(){

    log('log-system',`${G.e.name} appears!`);

/* ================================================================
   COMBAT HELPERS
================================================================ */
function roll(a,b){ return Math.floor(Math.random()*(b-a+1))+a; }

function hitEnemy(s,raw,type,pierce,ignoreDefenses){
    // Check enemy invisibility
    if(s.e.invisible&&s.e.invisTurns>0&&!ignoreDefenses){
        log('log-player',`${s.e.name} is INVISIBLE! Attack misses!`); return s;
    }
    // Check enemy decoy
    if(s.e.hasDecoy&&s.e.decoyTurns>0&&!ignoreDefenses&&Math.random()<0.70){
        log('log-player',`Attack hits the DECOY! Miss!`); return s;
    }
    let d=raw;
    if(s.e.bracing){ d=Math.floor(d*.5); s.e.bracing=false; log('log-status',`${s.e.name} bracing! Halved to ${d}.`); }
    else if(!pierce){ d=Math.floor(d*(1-s.e.def)); }
    s.e.hp=Math.max(0,s.e.hp-d);
    log('log-damage',`→ ${d} ${type} dmg  [${s.e.hp}/${s.e.maxHp} HP]`);
    popup(d,'#ff8040','enemy-area'); flash('enemy-sprite','flash-hit'); return s;
}

function hitPlayer(s,d){
    s.p.hp=Math.max(0,s.p.hp-d);
    log('log-damage',`→ ${d} dmg to ${FRAMES[G.currentFrame].name}  [${s.p.hp}/${s.p.maxHp} HP]`);
    popup(d,'#ff4040','player-area'); flash('game','flash-hit'); return s;
}

function pickAI(e){ const tot=e.ai.reduce((n,a)=>n+a.w,0); let r=Math.random()*tot; for(const a of e.ai){r-=a.w;if(r<=0)return a.t;} return e.ai[0].t; }

/* ================================================================
   TURN FLOW
================================================================ */
function act(slot){
    if(G.whose!=='player'||G.phase!=='combat') return;
    // Basic attack
    if(slot==='atk'){
        if(G.p.energy<1){ log('log-system','Not enough energy!'); return; }
        G.p.energy-=1;
        log('log-player',`${FRAMES[G.currentFrame].name} attacks!`);
        G=hitEnemy(G,roll(14,20),'PHYSICAL',false);
        render();
        if(G.e.hp<=0) setTimeout(onWin,420);
        return;
    }
    // Frame ability
    const abDef=FRAMES[G.currentFrame].abilities[slot];
    if(!abDef){ return; }
    if(G.p.energy<abDef.cost){ log('log-system',`Not enough energy! Need ${abDef.cost} AP.`); return; }
    G.p.energy-=abDef.cost;
    const execKey=`${G.currentFrame}_${slot}`;
    G=ABILITY_EXEC[execKey](G);
    render();
    if(G.e.hp<=0) setTimeout(onWin,420);
}

function endTurn(){
    if(G.whose!=='player'||G.phase!=='combat') return;
    log('log-system','── End of player turn ──');
    G.whose='enemy'; setButtons(false); updateTurnBadge();
    setTimeout(doEnemyTurn,700);
}

function doEnemyTurn(){
    if(G.phase!=='combat') return;

    // Tick enemy poison
    if((G.e.poisonTurns||0)>0){
        G.e.hp=Math.max(0,G.e.hp-G.e.poisonDmg);
        log('log-status',`${G.e.name} takes ${G.e.poisonDmg} TOXIC dmg from poison! (${G.e.poisonTurns-1} left)`);
        G.e.poisonTurns--;
        render();
        if(G.e.hp<=0){ setTimeout(onWin,420); return; }
    }

    // Tick enemy status
    if(G.e.fx.includes('blinded')){ G.e.blindLeft--; if(G.e.blindLeft<=0){ G.e.fx=G.e.fx.filter(f=>f!=='blinded'); log('log-status',`${G.e.name} no longer blinded.`); } }
    if((G.e.decoyTurns||0)>0){ G.e.decoyTurns--; if(G.e.decoyTurns<=0){ G.e.hasDecoy=false; log('log-status',`${G.e.name}'s Decoy expires.`); } }
    if((G.e.invisTurns||0)>0){ G.e.invisTurns--; if(G.e.invisTurns<=0){ G.e.invisible=false; log('log-status',`${G.e.name} becomes visible!`); } }
    if((G.e.atkDebuffTurns||0)>0){ G.e.atkDebuffTurns--; if(G.e.atkDebuffTurns<=0){ G.e.atkDebuff=0; log('log-status',`${G.e.name}'s ATK restored.`); } }

    if(G.e.fx.includes('stunned')){ log('log-status',`${G.e.name} is STUNNED and skips!`); G.e.fx=G.e.fx.filter(f=>f!=='stunned'); render(); setTimeout(startPlayerTurn,500); return; }

    const c=pickAI(G.e); showEnemyBanner(c); G=AI[c](G); render();
    if(G.p.hp<=0){ setTimeout(showLose,420); return; }
    setTimeout(startPlayerTurn,650);
}

function startPlayerTurn(){
    // Tick player poison
    if(G.p.poisonTurns>0){
        G.p.hp=Math.max(0,G.p.hp-G.p.poisonDmg);
        log('log-status',`Poison! -${G.p.poisonDmg} HP. (${G.p.poisonTurns-1} turns left)`);
        G.p.poisonTurns--;
        if(G.p.hp<=0){ setTimeout(showLose,300); return; }
    }
    // Tick player buffs
    if(G.p.invisTurns>0){ G.p.invisTurns--; if(G.p.invisTurns===0) log('log-status','Invisibility fades.'); }
    if(G.p.decoyTurns>0){ G.p.decoyTurns--; if(G.p.decoyTurns===0) log('log-status','Decoy destroyed.'); }
    if(G.p.disarmedTurns>0) G.p.disarmedTurns--;

    G.whose='player'; G.turn++; G.p.energy=G.p.maxEnergy;
    log('log-system',`══ TURN ${G.turn}  —  Energy restored ══`);
    render(); setButtons(true); updateTurnBadge();
}

/* ================================================================
   ENCOUNTER PROGRESSION
================================================================ */
function onWin(){
    G.phase='over';
    if(G.mode==='junction'){ onJunctionWin(); return; }

    const enc=G.encounters[G.encIdx];
    if(enc.type==='boss'){ onPlanetComplete(); return; }

    G.encIdx++; renderStrip();
    const next=G.encounters[G.encIdx];
    if(next.type==='special') setTimeout(showSpecial,350);
    else showEncWin();
}

function onPlanetComplete(){
    const pl=PLANETS[G.currentPlanet];
    if(pl.isFinal){ showVictory(pl.reward); return; }
    const ov=mkOverlay('win',`<h2>PLANET CLEARED</h2>
        <p>${pl.name} liberated, Tenno.<br><br>${pl.boss.name} defeated.<br><br>HP remaining: ${G.p.hp} / ${G.p.maxHp}</p>
        <button class="obtn" id="ob">STAR CHART ▶</button>`);
    document.getElementById('ob').onclick=()=>{ ov.remove(); showStarChart(pl.next); };
}

function showEncWin(){
    const ov=mkOverlay('win',`<h2>ENEMY ELIMINATED</h2>
        <p>Area secured.<br><br>HP remaining: ${G.p.hp} / ${G.p.maxHp}</p>
        <button class="obtn" id="ob">NEXT ENCOUNTER ▶</button>`);
    document.getElementById('ob').onclick=()=>{ ov.remove(); G.p.energy=G.p.maxEnergy; startEncounter(); };
}

function showSpecial(){
    const s=SPECIALS[Math.floor(Math.random()*SPECIALS.length)]; s.apply(G.p);
    document.getElementById('spec-title').textContent=s.title;
    document.getElementById('spec-desc').innerHTML=s.desc.replace(/\n/g,'<br>');
    document.getElementById('spec-reward').innerHTML=s.reward.replace(/\n/g,'<br>');
    document.getElementById('special-screen').classList.add('active');
    document.getElementById('spec-continue').onclick=()=>{
        document.getElementById('special-screen').classList.remove('active');
        G.encIdx++; renderStrip(); G.p.energy=G.p.maxEnergy; startEncounter();
    };
}

function showLose(){
    G.phase='over';
    const ov=mkOverlay('lose',`<h2>MISSION FAILED</h2>
        <p>${FRAMES[G.currentFrame].name} has fallen, Tenno.<br><br>The Lotus mourns your loss.</p>
        <button class="obtn" id="ob">TRY AGAIN ▶</button>`);
    document.getElementById('ob').onclick=()=>{ ov.remove(); startGame(); };
}

function showVictory(reward){
    G.phase='over';
    const ov=mkOverlay('win',`<h2>MISSION COMPLETE</h2>
        <p>You have cleared the Star Chart, Tenno.<br><br>
        Final boss defeated.<br><br>
        New Warframe unlocked: ${reward}</p>
        <button class="obtn" id="ob">PLAY AGAIN ▶</button>`);
    document.getElementById('ob').onclick=()=>{ ov.remove(); startGame(); };
}

function mkOverlay(cls,html){
    const ov=document.createElement('div'); ov.className=`overlay ${cls}`; ov.innerHTML=html;
    document.getElementById('game').appendChild(ov); return ov;
}

/* ================================================================
   RENDER
================================================================ */
function renderActionButtons(){
    const frame=FRAMES[G.currentFrame];
    ['s1','s2','s3','s4'].forEach((slot,i)=>{
        const ab=frame.abilities[slot];
        const btn=document.getElementById(`btn-${slot}`);
        btn.innerHTML=`${['①','②','③','④'][i]} ${ab.name}<br>[${ab.cost} AP]`;
    });
    document.getElementById('frame-name').textContent=frame.name;
}

function render(){
    const {p,e}=G; if(!e) return;
    // Enemy
    document.getElementById('enemy-name').textContent=e.name;
    document.getElementById('enemy-hp-bar').style.width=(e.hp/e.maxHp*100)+'%';
    document.getElementById('enemy-hp-val').textContent=`${e.hp} / ${e.maxHp}`;
    let es='';
    if(e.fx.includes('blinded')) es+=`[BLIND:${e.blindLeft}t] `;
    if(e.bracing) es+='[BRACING] ';
    if(e.hasDecoy&&e.decoyTurns>0) es+=`[DECOY:${e.decoyTurns}t] `;
    if(e.invisible&&e.invisTurns>0) es+=`[INVISIBLE:${e.invisTurns}t] `;
    if((e.atkDebuff||0)>0) es+=`[ATK-${Math.round(e.atkDebuff*100)}%:${e.atkDebuffTurns}t] `;
    if((e.poisonTurns||0)>0) es+=`[POISON:${e.poisonTurns}t] `;
    document.getElementById('enemy-status').textContent=es;
    // Player
    document.getElementById('player-hp-bar').style.width=(p.hp/p.maxHp*100)+'%';
    document.getElementById('player-hp-val').textContent=`${p.hp} / ${p.maxHp}`;
    document.getElementById('player-en-bar').style.width=(p.energy/p.maxEnergy*100)+'%';
    document.getElementById('player-en-val').textContent=`${p.energy} / ${p.maxEnergy}`;
    let ps='';
    if(p.invisTurns>0) ps+=`[INVIS:${p.invisTurns}t] `;
    if(p.decoyTurns>0) ps+=`[DECOY:${p.decoyTurns}t] `;
    if(p.poisonTurns>0) ps+=`[POISON:${p.poisonTurns}t] `;
    document.getElementById('player-status').textContent=ps;
    // Ability buttons
    const frame=FRAMES[G.currentFrame];
    ['s1','s2','s3','s4'].forEach(slot=>{
        const ab=frame.abilities[slot];
        document.getElementById(`btn-${slot}`).disabled=p.energy<ab.cost||G.whose!=='player';
    });
    document.getElementById('btn-atk').disabled=p.energy<1||G.whose!=='player';
    document.getElementById('btn-end').disabled=G.whose!=='player';
    // Urgent end turn
    const canAct=G.whose==='player'&&(p.energy>=1);
    const noAbility=G.whose==='player'&&!['s1','s2','s3','s4'].some(s=>p.energy>=(frame.abilities[s].cost));
    document.getElementById('btn-end').classList.toggle('urgent',G.whose==='player'&&noAbility&&p.energy<1);
}

function updateTurnBadge(){
    const el=document.getElementById('turn-indicator');
    if(G.whose==='player'){ el.textContent='PLAYER TURN'; el.className=''; }
    else { el.textContent='ENEMY TURN'; el.className='enemy'; }
}

function setButtons(on){
    ['btn-atk','btn-s1','btn-s2','btn-s3','btn-s4','btn-end'].forEach(id=>{
        document.getElementById(id).disabled=!on;
    });
}

             jdecoy:'🌀 DECOY!',jinvis:'👁 INVISIBLE!',jgrasp:'✊ GRASP OF LOHK!',jvoid:'⚡ VOID BEAM!',
             jspores:'☣ SPORES!',jmiasma:'☣ MIASMA!',frenzy:'💢 FRENZY!',slam:'💥 SLAM!',

    for(const [r,c,col] of px){ ctx.fillStyle=col; ctx.fillRect(c*5,r*5,5,5); }
