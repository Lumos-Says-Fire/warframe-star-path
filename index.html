<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WARFRAME: STAR PATH</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg:         #08080f;
            --panel:      #0e0e1a;
            --border:     #c87000;
            --accent:     #00c8ff;
            --text:       #d0d0e0;
            --text-dim:   #505070;
            --hp:         #00e060;
            --energy:     #00c8ff;
            --enemy-col:  #ff4040;
            --dmg-col:    #ff8040;
            --status-col: #ff40ff;
        }

        * { margin:0; padding:0; box-sizing:border-box; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Press Start 2P', monospace;
            font-size: 8px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background: repeating-linear-gradient(
                0deg, transparent, transparent 2px,
                rgba(0,0,0,0.08) 2px, rgba(0,0,0,0.08) 4px
            );
            pointer-events: none;
            z-index: 9999;
        }

        #game {
            width: 640px;
            height: 480px;
            background: var(--panel);
            border: 3px solid var(--border);
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }

        /* ── Title bar ── */
        #titlebar {
            background: var(--bg);
            border-bottom: 2px solid var(--border);
            padding: 5px 10px;
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            flex-shrink: 0;
            min-height: 34px;
        }
        #titlebar .title { color: var(--border); font-size: 8px; letter-spacing: 1px; }
        #titlebar .node  { color: var(--accent);  font-size: 6px; text-align: right; }

        /* ── Encounter strip ── */
        #enc-strip {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0;
        }

        .enc-slot {
            position: relative;
            width: 22px;
            height: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .enc-icon {
            font-size: 11px;
            line-height: 1;
            color: #2a2a45;
            transition: color 0.25s, text-shadow 0.25s;
            display: block;
            user-select: none;
        }

        .enc-slot.current .enc-icon {
            color: #ffffff;
            text-shadow: 0 0 6px #ffffff, 0 0 14px var(--accent);
        }

        .enc-slot.done .enc-icon {
            color: #1e1e32;
        }

        .enc-x {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 15px;
            color: #bb0808;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.2s;
            text-shadow: 0 0 3px #ff0000;
            line-height: 1;
        }
        .enc-slot.done .enc-x { opacity: 1; }

        .enc-line {
            width: 7px;
            height: 2px;
            background: #1e1e32;
            flex-shrink: 0;
            transition: background 0.25s;
        }
        .enc-line.passed { background: #404060; }

        /* ── Special encounter screen ── */
        #special-screen {
            display: none;
            position: absolute;
            inset: 0;
            background: var(--bg);
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 300;
            gap: 0;
            padding: 24px;
        }
        #special-screen.active { display: flex; }

        #special-screen .spec-tag {
            font-size: 6px;
            color: var(--status-col);
            border: 1px solid var(--status-col);
            padding: 3px 10px;
            margin-bottom: 16px;
            letter-spacing: 2px;
        }
        #special-screen h2 {
            font-size: 13px;
            color: var(--status-col);
            text-shadow: 0 0 14px var(--status-col);
            margin-bottom: 18px;
            text-align: center;
        }
        #special-screen .spec-desc {
            font-size: 7px;
            color: var(--text);
            line-height: 2.6;
            text-align: center;
            margin-bottom: 18px;
        }
        #special-screen .spec-reward {
            font-size: 7px;
            color: var(--accent);
            line-height: 2.4;
            text-align: center;
            padding: 10px 16px;
            border: 1px solid var(--accent);
            margin-bottom: 22px;
        }
        #special-screen .spec-reward::before {
            content: 'REWARD';
            display: block;
            font-size: 6px;
            color: var(--text-dim);
            margin-bottom: 6px;
        }

        /* ── Frame Switch Screen ── */
        #frame-switch-screen {
            display: none;
            position: absolute;
            inset: 0;
            background: var(--bg);
            flex-direction: column;
            z-index: 400;
            padding: 20px 24px;
        }
        #frame-switch-screen.active { display: flex; }

        .fs-title {
            font-size: 11px;
            color: var(--border);
            text-align: center;
            margin-bottom: 20px;
            text-shadow: 0 0 12px var(--border);
        }

        .fs-panels {
            display: flex;
            gap: 20px;
            flex: 1;
            min-height: 0;
        }

        .fs-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 8px;
            border: 2px solid #2a2a3a;
            padding: 12px;
            background: #0a0a14;
            position: relative;
        }

        .fs-panel.current { border-color: var(--accent); }
        .fs-panel.new     { border-color: var(--status-col); }

        .fs-frame-sprite {
            width: 80px;
            height: 80px;
            margin: 0 auto 8px;
            background: #14142a;
            border: 1px solid #2a2a3a;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            cursor: pointer;
            transition: border-color 0.2s;
            position: relative;
        }
        .fs-panel.current .fs-frame-sprite { border-color: var(--accent); }
        .fs-panel.new     .fs-frame-sprite { border-color: var(--status-col); }

        .fs-frame-sprite:hover .fs-choice-btn { opacity: 1; }

        .fs-choice-btn {
            position: absolute;
            inset: 0;
            background: rgba(8,8,15,0.92);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.2s;
            cursor: pointer;
        }

        .fs-choice-btn button {
            background: var(--bg);
            border: 2px solid var(--border);
            color: var(--border);
            font-family: 'Press Start 2P', monospace;
            font-size: 7px;
            padding: 6px 12px;
            cursor: pointer;
        }
        .fs-choice-btn button:hover { background: var(--border); color: var(--bg); }

        .fs-frame-name {
            font-size: 8px;
            color: var(--text);
            text-align: center;
            margin-bottom: 10px;
        }
        .fs-panel.current .fs-frame-name { color: var(--accent); }
        .fs-panel.new     .fs-frame-name { color: var(--status-col); }

        .fs-ab-list {
            display: flex;
            flex-direction: column;
            gap: 4px;
            overflow-y: auto;
        }

        .fs-ab-row {
            background: #0e0e1a;
            border: 1px solid #1e1e32;
            padding: 5px 7px;
            font-size: 6px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: background 0.1s, border-color 0.1s;
            position: relative;
        }
        .fs-ab-row:hover { background: #14142a; border-color: var(--border); }

        .fs-ab-name { color: var(--text); flex: 1; }
        .fs-ab-cost { color: var(--accent); white-space: nowrap; margin-left: 6px; }

        /* Tooltip */
        .fs-tooltip {
            position: absolute;
            z-index: 500;
            background: #08080f;
            border: 2px solid var(--border);
            padding: 8px 10px;
            font-size: 6px;
            line-height: 2.2;
            color: var(--text);
            pointer-events: none;
            display: none;
            max-width: 200px;
            min-width: 140px;
        }
        .fs-tooltip.active { display: block; }
        .fs-tooltip-label { color: var(--border); margin-bottom: 4px; }
        .fs-tooltip-stat  { color: var(--text-dim); }
        .fs-tooltip-dmg   { color: var(--dmg-col); }
        .fs-tooltip-dur   { color: var(--status-col); }

        /* ── Star Chart Screen ── */
        #star-chart-screen {
            display: none;
            position: absolute;
            inset: 0;
            background: var(--bg);
            flex-direction: column;
            z-index: 400;
            padding: 20px 24px;
        }
        #star-chart-screen.active { display: flex; }

        .sc-title {
            font-size: 11px;
            color: var(--border);
            text-align: center;
            margin-bottom: 20px;
            text-shadow: 0 0 12px var(--border);
        }

        .sc-panels {
            display: flex;
            gap: 20px;
            flex: 1;
            justify-content: center;
            align-items: center;
        }

        .sc-panel {
            width: 240px;
            height: 280px;
            border: 2px solid var(--border);
            background: #0a0a14;
            padding: 16px;
            display: flex;
            flex-direction: column;
            cursor: pointer;
            transition: all 0.2s;
        }
        .sc-panel:hover { background: #14142a; box-shadow: 0 0 16px var(--border); }
        .sc-panel.single { width: 280px; }

        .sc-planet-icon {
            width: 80px;
            height: 80px;
            margin: 0 auto 12px;
            background: #14142a;
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
        }

        .sc-planet-name {
            font-size: 10px;
            color: var(--border);
            text-align: center;
            margin-bottom: 8px;
        }

        .sc-faction {
            font-size: 6px;
            color: var(--text-dim);
            text-align: center;
            margin-bottom: 6px;
        }

        .sc-faction-icon {
            font-size: 24px;
            text-align: center;
            margin-bottom: 12px;
        }

        .sc-desc {
            font-size: 6px;
            color: var(--text);
            line-height: 2.2;
            text-align: center;
            flex: 1;
        }

        .sc-proceed {
            background: var(--bg);
            border: 2px solid var(--border);
            color: var(--border);
            font-family: 'Press Start 2P', monospace;
            font-size: 8px;
            padding: 8px 18px;
            cursor: pointer;
            margin-top: 16px;
            width: 100%;
        }
        .sc-proceed:hover { background: var(--border); color: var(--bg); }

        /* ── Character Select Screen ── */
        #character-select-screen {
            display: none;
            position: absolute;
            inset: 0;
            background: var(--bg);
            flex-direction: column;
            z-index: 400;
            padding: 20px 24px;
        }
        #character-select-screen.active { display: flex; }

        .cs-title {
            font-size: 11px;
            color: var(--border);
            text-align: center;
            margin-bottom: 20px;
            text-shadow: 0 0 12px var(--border);
        }

        .cs-test-toggle {
            text-align: center;
            margin-bottom: 16px;
        }

        .cs-test-toggle label {
            font-size: 6px;
            color: var(--text-dim);
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .cs-test-toggle input[type="checkbox"] {
            cursor: pointer;
        }

        .cs-carousel-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin-bottom: 24px;
        }

        .cs-arrow {
            background: var(--bg);
            border: 2px solid var(--border);
            color: var(--border);
            font-family: 'Press Start 2P', monospace;
            font-size: 14px;
            padding: 12px 16px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .cs-arrow:hover { background: var(--border); color: var(--bg); }
        .cs-arrow:disabled { opacity: 0.3; cursor: not-allowed; border-color: #2a2a3a; }

        .cs-carousel {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 24px;
            max-width: 500px;
        }

        .cs-frame-side {
            opacity: 0.4;
            transition: opacity 0.3s;
        }

        .cs-frame-side:not(.hidden) {
            opacity: 0.6;
        }

        .cs-frame-side.hidden {
            visibility: hidden;
        }

        .cs-frame-sprite-side {
            width: 80px;
            height: 80px;
            background: #14142a;
            border: 2px solid #2a2a3a;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
        }

        .cs-frame-display {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }

        .cs-frame-sprite {
            width: 120px;
            height: 120px;
            background: #14142a;
            border: 3px solid var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            box-shadow: 0 0 20px var(--accent);
            position: relative;
            transition: all 0.3s;
        }

        .cs-frame-sprite.locked {
            border-color: #2a2a3a;
            box-shadow: none;
            opacity: 0.4;
        }

        .cs-lock-overlay {
            position: absolute;
            inset: 0;
            background: rgba(8,8,15,0.8);
            display: none;
            align-items: center;
            justify-content: center;
            font-size: 40px;
        }

        .cs-frame-sprite.locked .cs-lock-overlay {
            display: flex;
        }

        .cs-frame-name {
            font-size: 12px;
            color: var(--accent);
            text-shadow: 0 0 10px var(--accent);
            letter-spacing: 2px;
            transition: color 0.3s;
        }

        .cs-frame-name.locked {
            color: #505070;
            text-shadow: none;
        }

        .cs-abilities {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 4px;
            margin-bottom: 16px;
            min-height: 0;
        }

        .cs-ability-row {
            background: #0e0e1a;
            border: 1px solid #1e1e32;
            padding: 6px 10px;
            font-size: 6px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .cs-ability-left {
            flex: 1;
        }

        .cs-ability-name {
            color: var(--accent);
            font-size: 7px;
            margin-bottom: 3px;
        }

        .cs-ability-desc {
            color: var(--text);
            line-height: 1.8;
        }

        .cs-ability-right {
            display: flex;
            gap: 10px;
            align-items: center;
            white-space: nowrap;
        }

        .cs-ability-cost {
            color: var(--text-dim);
        }

        .cs-ability-dmg {
            color: var(--dmg-col);
        }

        .cs-ability-dur {
            color: var(--status-col);
        }

        .cs-select-btn {
            background: var(--bg);
            border: 2px solid var(--border);
            color: var(--border);
            font-family: 'Press Start 2P', monospace;
            font-size: 9px;
            padding: 12px 24px;
            cursor: pointer;
            width: 100%;
            transition: all 0.2s;
        }
        .cs-select-btn:hover:not(:disabled) { background: var(--border); color: var(--bg); box-shadow: 0 0 16px var(--border); }
        .cs-select-btn:disabled { 
            opacity: 0.3; 
            cursor: not-allowed; 
            border-color: #2a2a3a; 
            color: #505070;
        }

        /* ── Enemy area ── */
        #enemy-area {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px 16px;
            gap: 20px;
            border-bottom: 2px solid #1a1a2a;
            background: linear-gradient(180deg, #08080f 0%, #0e0e1a 100%);
            position: relative;
        }

        #enemy-sprite {
            width: 80px; height: 80px;
            flex-shrink: 0;
            image-rendering: pixelated;
        }

        #enemy-info { flex: 1; }

        #enemy-name {
            color: var(--enemy-col);
            font-size: 9px;
            margin-bottom: 8px;
            text-shadow: 0 0 8px var(--enemy-col);
        }

        #enemy-status {
            color: var(--status-col);
            font-size: 6px;
            margin-bottom: 6px;
            min-height: 12px;
        }

        .bar-group { margin-bottom: 6px; }
        .bar-label { font-size: 6px; color: var(--text-dim); margin-bottom: 3px; }
        .bar-outer {
            height: 10px;
            background: #0a0a14;
            border: 1px solid #2a2a3a;
            overflow: hidden;
        }
        .bar-inner {
            height: 100%;
            transition: width 0.3s ease;
            position: relative;
        }
        .bar-inner::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 3px;
            background: rgba(255,255,255,0.18);
        }
        .bar-hp     .bar-inner { background: var(--hp);        box-shadow: 0 0 6px var(--hp); }
        .bar-ehp    .bar-inner { background: var(--enemy-col); box-shadow: 0 0 6px var(--enemy-col); }
        .bar-energy .bar-inner { background: var(--energy);    box-shadow: 0 0 6px var(--energy); }
        .bar-value { font-size: 6px; color: var(--text-dim); margin-top: 2px; }

        #turn-indicator {
            position: absolute;
            top: 6px; right: 8px;
            font-size: 7px;
            padding: 3px 7px;
            background: var(--bg);
            border: 1px solid var(--border);
            color: var(--accent);
            transition: all 0.2s;
        }
        #turn-indicator.enemy { color: var(--enemy-col); border-color: var(--enemy-col); }

        #enc-type-label {
            position: absolute;
            top: 6px; left: 8px;
            font-size: 6px;
            padding: 3px 7px;
            background: var(--bg);
            border: 1px solid var(--text-dim);
            color: var(--text-dim);
        }
        #enc-type-label.boss-lbl { color: var(--enemy-col); border-color: var(--enemy-col); }
        #enc-type-label.spec-lbl { color: var(--status-col); border-color: var(--status-col); }
        #enc-type-label.junc-lbl { color: var(--border); border-color: var(--border); }

        #enemy-action {
            position: absolute;
            bottom: 8px; left: 50%;
            transform: translateX(-50%);
            font-size: 7px;
            color: var(--enemy-col);
            background: rgba(8,8,15,0.85);
            border: 1px solid var(--enemy-col);
            padding: 3px 10px;
            white-space: nowrap;
            opacity: 0;
            transition: opacity 0.25s;
            pointer-events: none;
        }
        #enemy-action.show { opacity: 1; }

        /* ── Combat log ── */
        #log-area {
            height: 80px;
            overflow-y: auto;
            padding: 6px 10px;
            background: var(--bg);
            border-bottom: 2px solid #1a1a2a;
            flex-shrink: 0;
            scrollbar-width: thin;
            scrollbar-color: var(--border) transparent;
        }
        .log-entry { font-size: 7px; line-height: 2.1; }
        .log-player { color: var(--accent); }
        .log-enemy  { color: var(--enemy-col); }
        .log-system { color: var(--border); }
        .log-damage { color: var(--dmg-col); }
        .log-status { color: var(--status-col); }

        /* ── Player area ── */
        #player-area {
            padding: 8px 10px 10px;
            flex-shrink: 0;
        }
        #player-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }
        #frame-name {
            color: var(--accent);
            font-size: 9px;
            text-shadow: 0 0 8px var(--accent);
        }
        #player-status { color: var(--status-col); font-size: 6px; }
        #player-bars { display: flex; gap: 16px; margin-bottom: 8px; }
        #player-bars .bar-group { flex: 1; }

        #actions { display: flex; flex-wrap: wrap; gap: 4px; }

        .btn {
            background: var(--bg);
            border: 2px solid var(--border);
            color: var(--text);
            font-family: 'Press Start 2P', monospace;
            font-size: 6px;
            padding: 5px 6px;
            cursor: pointer;
            line-height: 1.6;
            flex: 1;
            min-width: 90px;
            text-align: center;
            transition: background 0.1s, color 0.1s, box-shadow 0.1s;
        }
        .btn:hover:not(:disabled) { background: var(--border); color: var(--bg); box-shadow: 0 0 8px var(--border); }
        .btn:active:not(:disabled) { transform: translateY(1px); }
        .btn:disabled { opacity: 0.28; cursor: not-allowed; border-color: #2a2a3a; }
        .btn.ability { border-color: var(--accent); }
        .btn.ability:hover:not(:disabled) { background: var(--accent); color: var(--bg); box-shadow: 0 0 8px var(--accent); }
        .btn.end { border-color: #505070; flex: 0 0 auto; min-width: auto; padding: 5px 12px; color: #505070; }
        .btn.end:hover:not(:disabled) { background: #505070; color: var(--bg); box-shadow: none; }
        .btn.end.urgent {
            border-color: var(--border);
            color: var(--border);
            box-shadow: 0 0 8px var(--border);
            animation: pulse-end 1s ease-in-out infinite;
        }
        .btn.end.urgent:hover:not(:disabled) { background: var(--border); color: var(--bg); }
        @keyframes pulse-end {
            0%,100% { box-shadow: 0 0 6px var(--border); }
            50%     { box-shadow: 0 0 14px var(--border), 0 0 28px rgba(200,112,0,0.4); }
        }

        /* ── Damage popup ── */
        .dmg-popup {
            position: absolute;
            font-size: 11px;
            pointer-events: none;
            animation: floatUp 0.9s ease-out forwards;
            z-index: 200;
            text-shadow: 2px 2px 0 #000;
        }
        @keyframes floatUp {
            0%   { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-36px); }
        }
        @keyframes flashRed  { 0%,100%{filter:none} 40%{filter:brightness(2) sepia(1) hue-rotate(300deg)} }
        @keyframes flashBlue { 0%,100%{filter:none} 40%{filter:brightness(2.5) saturate(3) hue-rotate(160deg)} }
        .flash-hit     { animation: flashRed  0.3s; }

        .overlay {

            inset: 0;

            align-items: center;
            justify-content: center;
            z-index: 500;

        .overlay.win  h2 { color: var(--border);     text-shadow: 0 0 14px var(--border); }

        .overlay.plan h2 { color: var(--border);     text-shadow: 0 0 14px var(--border); }

        .overlay .reward { font-size: 7px; color: var(--accent); margin-bottom: 10px; text-align: center; line-height: 2.4; }
        .obtn {
            background: var(--bg);
            border: 2px solid var(--border);
            color: var(--border);
            font-family: 'Press Start 2P', monospace;
            font-size: 8px;
            padding: 8px 18px;
            cursor: pointer;
            margin-top: 10px;
        }
        .obtn:hover { background: var(--border); color: var(--bg); }
        .obtn.acc { border-color: var(--accent); color: var(--accent); }
        .obtn.acc:hover { background: var(--accent); color: var(--bg); }
    </style>
</head>

const AI = {
    attack(s){
        if(s.e.fx && s.e.fx.includes('blinded') && Math.random()<0.60){ log('log-enemy',`${s.e.name} attacks wildly — MISS!`); return s; }
        if(s.p.decoyActive){ log('log-enemy',`${s.e.name} attacks the decoy!`); return s; }
        let d=roll(Math.floor(s.e.atk*0.8),Math.floor(s.e.atk*1.2));
        if(s.e.disarmed) d=Math.floor(d*0.5);
        if(s.e.frozen) d=Math.floor(d*0.8);
        if(s.e.whisperActive) d+=roll(8,14);
        if(s.e.warcryActive) d=Math.floor(d*1.3);
        log('log-enemy',`${s.e.name} attacks for ${d} damage!`);
        return hitPlayer(s,d);
    },
    brace(s){ s.e.bracing=true; log('log-enemy',`${s.e.name} braces!`); return s; },
    suppress(s){
        if(s.e.fx && s.e.fx.includes('blinded') && Math.random()<0.55){ log('log-enemy',`${s.e.name} fires blindly — MISS!`); return s; }
        if(s.p.decoyActive){ log('log-enemy',`${s.e.name} suppresses the decoy!`); return s; }
        let d=roll(Math.floor(s.e.atk*0.6),Math.floor(s.e.atk*0.85));
        if(s.e.disarmed) d=Math.floor(d*0.5);

    },
    rocket(s){
        if(s.e.fx && s.e.fx.includes('blinded') && Math.random()<0.35){ log('log-enemy',`${s.e.name} fires rocket — veers off! MISS!`); return s; }

================================================================ */
function renderStrip(){
    const strip=document.getElementById('enc-strip');
    strip.innerHTML='';
    G.encounters.forEach((enc,i)=>{
        if(i>0){ const ln=document.createElement('div'); ln.className='enc-line'+(i<=G.encIdx?' passed':''); strip.appendChild(ln); }
        const slot=document.createElement('div');
        slot.className='enc-slot '+(i<G.encIdx?'done':i===G.encIdx?'current':'upcoming');
        const ic=document.createElement('span'); ic.className='enc-icon';
        
        // Determine icon based on encounter type and faction
        if(enc.type==='special'){
            ic.textContent='?';
        } else if(enc.type==='boss'){
            ic.textContent='☠';
        } else {
            // Use encounter-specific faction if available, otherwise planet default
            const faction = enc.faction || G.planetData.faction;
            ic.textContent = FACTIONS[faction].icon;
        }
        
        const x=document.createElement('span');  x.className='enc-x';    x.textContent='✕';
        slot.appendChild(ic); slot.appendChild(x); strip.appendChild(slot);
    });
}

/* ================================================================
   COMBAT HELPERS
================================================================ */
function roll(a,b){ return Math.floor(Math.random()*(b-a+1))+a; }

function hitEnemy(s,raw,type,pierce){
    let d=raw;
    
    // Warcry boost
    if(s.p.warcryActive){
        d = Math.floor(d * 1.30);
    }
    
    // Decoy check
    if(s.e.decoyActive){
        log('log-status',`Hit the decoy instead!`);
        return s;
    }

    // Enemy globe check
    if(s.e.globeActive){
        log('log-status','Enemy Snow Globe negates your hit!');
        s.e.globeActive = false;
        return s;
    }

    // Enemy shield check
    if(s.e.shieldActive){
        d = Math.floor(d * 0.5);
        s.e.shieldActive = false;
        log('log-status',`Enemy shield halves damage to ${d}!`);
    }

    // Enemy drone check
    if(s.e.droneActive){
        d = Math.floor(d * 0.7);
        log('log-status',`Support drone reduces damage to ${d}!`);
    }

    // Phased enemy
    if(s.e.phased){
        d=Math.floor(d*0.5);
        s.e.phased=false;
        log('log-status',`Enemy was phased! Damage halved to ${d}.`);
    }
    
    // Bracing
    if(s.e.bracing){
        d=Math.floor(d*0.5);
        s.e.bracing=false;
        log('log-status',`${s.e.name} was bracing! Halved to ${d}.`);
    } else if(!pierce){
        d=Math.floor(d*(1-s.e.def));
    }

    // Whisper bonus
    if(s.p.whisperActive){
        const bonus = roll(8,14);
        d += bonus;
        log('log-status',`Xata's Whisper adds ${bonus} Void damage!`);
    }

    s.e.hp=Math.max(0,s.e.hp-d);
    log('log-damage',`→ ${d} ${type} dmg  [${s.e.hp}/${s.e.maxHp} HP]`);
    popup(d,'#ff8040','enemy-area'); flash('enemy-sprite','flash-hit'); 
    return s;
}

function hitPlayer(s,d){
    if(s.p.invisible){
        log('log-status','You are invisible — attack missed!');
        return s;
    }

    // Snow Globe/Containment Wall check
    if(s.p.globeActive){
        const source = s.p.globeSource || 'Shield';
        log('log-status',`${source} negates the hit!`);
        s.p.globeActive = false;
        s.p.globeSource = null;
        return s;
    }

    // Disometric Guard defense buff
    if(s.p.bulwarkActive){
        d = Math.floor(d * 0.6); // 40% defense = 60% damage taken
        log('log-status',`Disometric Guard reduces damage to ${d}!`);
    }

    // Electric Shield/Cathode Grace check
    if(s.p.shieldActive){
        d = Math.floor(d * 0.5);
        log('log-status',`Electric Shield halves damage to ${d}!`);
    }

    // Frozen debuff on player
    if(s.p.frozenTurns > 0){
        d = Math.floor(d * 0.8);
    }

    s.p.hp=Math.max(0,s.p.hp-d);
    log('log-damage',`→ ${d} dmg to ${s.p.frameName}  [${s.p.hp}/${s.p.maxHp} HP]`);
    popup(d,'#ff4040','player-area'); flash('game','flash-hit'); 
    return s;
}

function pickAI(e){
    const tot=e.ai.reduce((n,a)=>n+a.w,0);
    let r=Math.random()*tot;
    for(const a of e.ai){ r-=a.w; if(r<=0) return a.t; }
    return e.ai[0].t;
}

                'Ophidian Bite': 'lavos_ophidian_bite',
                'Vial Rush': 'lavos_vial_rush',
                'Transmutation Probe': 'lavos_transmutation_probe',
                'Catalyze': 'lavos_catalyze'
            }
        };
        
        const abilityKey = abilityMap[G.p.frame]?.[ability.name];
        ab = abilityKey ? ABILITIES[abilityKey] : null;
        if(!ab) {
            console.error(`Ability not found: ${G.p.frame} - ${ability.name} - ${abilityKey}`);
            return;
        }
    }

    if(G.p.energy<ab.cost){ log('log-system',`Not enough energy! Need ${ab.cost} AP.`); return; }
    G.p.energy-=ab.cost; 
    G=ab.run(G); 
    render();
    if(G.e.hp<=0) setTimeout(onWin,420);
}

function endTurn(){
    if(G.whose!=='player' || G.phase!=='combat') return;
    log('log-system','── End of player turn ──');

    G.whose='enemy'; setButtons(false); updateTurnBadge();
    setTimeout(doEnemyTurn,700);
}

function doEnemyTurn(){
    if(G.phase!=='combat') return;

    // Tick enemy buffs/debuffs
    if(G.e.fx && G.e.fx.includes('blinded')){ G.e.blindLeft--; if(G.e.blindLeft<=0){ G.e.fx=G.e.fx.filter(f=>f!=='blinded'); log('log-status',`${G.e.name} is no longer blinded.`); } }
    if(G.e.decoyActive){ G.e.decoyTurns--; if(G.e.decoyTurns<=0){ G.e.decoyActive=false; log('log-status','Enemy decoy vanishes.'); } }
    if(G.e.invisible){ G.e.invisTurns--; if(G.e.invisTurns<=0){ G.e.invisible=false; log('log-status','Enemy is visible again.'); } }
    if(G.e.disarmed){ G.e.disarmTurns--; if(G.e.disarmTurns<=0){ G.e.disarmed=false; log('log-status','Enemy weapon functional again.'); } }
    if(G.e.whisperActive){ G.e.whisperTurns--; if(G.e.whisperTurns<=0){ G.e.whisperActive=false; log('log-status','Enemy Whisper fades.'); } }
    if(G.e.phased){ G.e.phaseTurns--; if(G.e.phaseTurns<=0) G.e.phased=false; }
    if(G.e.frenzied){ G.e.frenzyTurns--; if(G.e.frenzyTurns<=0){ G.e.frenzied=false; log('log-status','Enemy frenzy ends.'); } }
    if(G.e.droneActive){ G.e.droneTurns--; if(G.e.droneTurns<=0){ G.e.droneActive=false; log('log-status','Support drone deactivates.'); } }
    if(G.e.warcryActive){ G.e.warcryTurns--; if(G.e.warcryTurns<=0){ G.e.warcryActive=false; log('log-status','Enemy Warcry fades.'); } }
    if(G.e.speedActive){ G.e.speedTurns--; if(G.e.speedTurns<=0){ G.e.speedActive=false; log('log-status','Enemy Speed fades.'); } }
    if(G.e.shieldActive){ G.e.shieldTurns--; if(G.e.shieldTurns<=0){ G.e.shieldActive=false; log('log-status','Enemy shield fades.'); } }
    if(G.e.frozenTurns > 0){ 
        G.e.frozenTurns--; 
        if(G.e.frozenTurns<=0){
            G.e.frozen=false;
            log('log-status','Enemy is no longer slowed.'); 
        }
    }
    if(G.e.spores){
        G.e.hp=Math.max(0,G.e.hp-G.e.sporeDmg);
        log('log-status',`Spores deal ${G.e.sporeDmg} toxin damage to enemy!`);
        G.e.sporeTurns--;
        if(G.e.sporeTurns<=0){ G.e.spores=false; log('log-status','Enemy spores fade.'); }
    }
    if(G.e.coilActive){
        G.e.hp=Math.max(0,G.e.hp-G.e.coilDmg);
        log('log-status',`Tesla coil deals ${G.e.coilDmg} electric damage to enemy!`);
        G.e.coilTurns--;
        if(G.e.coilTurns<=0){ G.e.coilActive=false; log('log-status','Tesla coil deactivates.'); }
    }

    if(G.e.fx && G.e.fx.includes('stunned')){ log('log-status',`${G.e.name} is STUNNED!`); G.e.fx=G.e.fx.filter(f=>f!=='stunned'); render(); setTimeout(startPlayerTurn,500); return; }

    // Junction AI uses abilities
    if(G.isJunction && G.e.energy >= 2){
        const abilities = JUNCTION_FRAMES[G.e.sprite.replace('frame_','')].abilities;
        const affordable = abilities.filter(a => a.cost <= G.e.energy);
        if(affordable.length > 0 && Math.random() < 0.6){
            const chosen = affordable[Math.floor(Math.random() * affordable.length)];
            G.e.energy -= chosen.cost;
            showEnemyBanner(chosen.t);
            G = chosen.run(G);
            render();
            if(G.p.hp<=0){ setTimeout(showLose,420); return; }
            setTimeout(startPlayerTurn,650);
            return;
        }
    }

    // Regular AI
    const c=pickAI(G.e); showEnemyBanner(c);
    
    if(AI[c]){
        G=AI[c](G);
    } else {
        // Fallback to attack
        G=AI.attack(G);
    }
    
    render();
    if(G.p.hp<=0){ setTimeout(showLose,420); return; }
    setTimeout(startPlayerTurn,650);
}

function startPlayerTurn(){
    G.whose='player'; G.turn++;
    
    // Tick player buffs/debuffs BEFORE restoring energy
    if(G.p.decoyActive){ G.p.decoyTurns--; if(G.p.decoyTurns<=0){ G.p.decoyActive=false; log('log-status','Your decoy vanishes.'); } }
    if(G.p.invisible){ G.p.invisTurns--; if(G.p.invisTurns<=0){ G.p.invisible=false; log('log-status','You are visible again.'); } }
    if(G.p.disarmed){ G.p.disarmTurns--; if(G.p.disarmTurns<=0){ G.p.disarmed=false; log('log-status','Your weapon is functional again.'); } }
    if(G.p.whisperActive){ G.p.whisperTurns--; if(G.p.whisperTurns<=0){ G.p.whisperActive=false; log('log-status','Xata\'s Whisper fades.'); } }
    if(G.p.speedActive){ G.p.speedTurns--; if(G.p.speedTurns<=0){ G.p.speedActive=false; log('log-status','Speed buff fades.'); } }
    if(G.p.shieldActive){ G.p.shieldTurns--; if(G.p.shieldTurns<=0){ G.p.shieldActive=false; log('log-status','Electric Shield fades.'); } }
    if(G.p.warcryActive){ G.p.warcryTurns--; if(G.p.warcryTurns<=0){ G.p.warcryActive=false; log('log-status','Warcry fades.'); } }
    if(G.p.bulwarkActive){ G.p.bulwarkTurns--; if(G.p.bulwarkTurns<=0){ G.p.bulwarkActive=false; log('log-status','Disometric Guard fades.'); } }
    if(G.p.frozenTurns > 0){ G.p.frozenTurns--; if(G.p.frozenTurns<=0) log('log-status','You are no longer slowed.'); }
    if(G.p.spores){
        G.p.hp=Math.max(0,G.p.hp-G.p.sporeDmg);
        log('log-status',`Spores deal ${G.p.sporeDmg} toxin damage!`);
        G.p.sporeTurns--;
        if(G.p.sporeTurns<=0){ G.p.spores=false; log('log-status','Spores fade.'); }
    }
    
    // Restore energy
    G.p.energy=G.p.maxEnergy;
    
    // Speed buff gives +1 AP if still active
    if(G.p.speedActive){
        G.p.energy += 1;
        log('log-status','Speed buff grants +1 AP!');
    }
    
    if(G.isJunction) G.e.energy = Math.min(G.e.maxEnergy, G.e.energy + 3);
    log('log-system',`══ TURN ${G.turn}  —  Energy restored ══`);
    render(); setButtons(true); updateTurnBadge();
}

/* ================================================================
   ENCOUNTER PROGRESSION
================================================================ */
function onWin(){
    G.phase='over';
    
    if(G.isJunction){
        // Junction win
        const junctionKey = G.e.sprite.replace('frame_','');
        const frameData = FRAMES[junctionKey];
        
        // Restore HP
        G.p.hp = G.p.maxHp;
        log('log-system','HP fully restored!');
        
        // Unlock frame
        if(!UNLOCKED_FRAMES.includes(junctionKey)){
            UNLOCKED_FRAMES.push(junctionKey);
        }
        
        // Store where we're going next (set when junction started)
        setTimeout(()=>showFrameSwitch(junctionKey), 600);
        return;
    }

    const enc=G.encounters[G.encIdx];
    if(enc.type==='boss'){
        // Planet complete - check for junction
        const pl = G.planetData;
        if(pl.nextJunction){
            const ov=mkOverlay('win',`<h2>PLANET CLEARED</h2>
                <p>${pl.name} liberated!<br><br>${pl.boss.name} defeated.<br><br>HP: ${G.p.hp} / ${G.p.maxHp}</p>
                <button class="obtn" id="ob">JUNCTION ▶</button>`);
            document.getElementById('ob').onclick=()=>{ 
                ov.remove();
                // Store where we're going after this junction
                G.nextDestination = JUNCTIONS[pl.nextJunction].planet;
                startJunctionFight(JUNCTIONS[pl.nextJunction].frame);
            };
        } else if(pl.nextChoice){
            showStarChart(pl.nextChoice);
        } else if(pl.nextPlanet){
            showStarChart([{type:'planet', id:pl.nextPlanet}]);
        } else if(pl.isFinal){
            showVictory(pl.reward);
        }
        return;
    }

    G.encIdx++; renderStrip();
    if(G.encounters[G.encIdx].type==='special') setTimeout(showSpecial, 350);
    else showEncWin();
}

function showEncWin(){
    const ov=mkOverlay('win',`<h2>ENEMY ELIMINATED</h2><p>Area secured.<br><br>HP: ${G.p.hp} / ${G.p.maxHp}</p><button class="obtn" id="ob">NEXT ENCOUNTER ▶</button>`);
    document.getElementById('ob').onclick=()=>{ ov.remove(); G.p.energy=G.p.maxEnergy; startEncounter(); };
}

function showSpecial(){
    const s=SPECIALS[Math.floor(Math.random()*SPECIALS.length)];
    s.apply(G.p);
    document.getElementById('spec-title').textContent=s.title;
    document.getElementById('spec-desc').innerHTML=s.desc.replace(/\n/g,'<br>');
    document.getElementById('spec-reward').innerHTML=s.reward.replace(/\n/g,'<br>');
    document.getElementById('special-screen').classList.add('active');
    document.getElementById('spec-continue').onclick = () => {
        document.getElementById('special-screen').classList.remove('active');
        G.encIdx++;
        renderStrip();
        G.p.energy = G.p.maxEnergy;
        startEncounter();
    };
}

function showVictory(rewardFrame){
    const frameName = rewardFrame ? (FRAMES[rewardFrame]?.name || rewardFrame.toUpperCase()) : 'UNKNOWN';
    const ov=mkOverlay('win',`<h2>VICTORY!</h2>
        <p>You have reached the end of this path.<br><br>Unlocked: ${frameName}</p>
        <button class="obtn" id="ob">NEW RUN ▶</button>`);
    if(rewardFrame && !UNLOCKED_FRAMES.includes(rewardFrame)) UNLOCKED_FRAMES.push(rewardFrame);
    document.getElementById('ob').onclick=()=>{ ov.remove(); startGame(); };
}

function showLose(){
    G.phase='over';
    const ov=mkOverlay('lose',`<h2>MISSION FAILED</h2><p>${G.p.frameName} has fallen.<br><br>The Lotus mourns.</p><button class="obtn" id="ob">TRY AGAIN ▶</button>`);
    document.getElementById('ob').onclick=()=>{ ov.remove(); startGame(); };
}

function mkOverlay(cls,html){
    const ov=document.createElement('div'); ov.className=`overlay ${cls}`; ov.innerHTML=html;
    document.getElementById('game').appendChild(ov); return ov;
}

/* ================================================================
   FRAME SWITCH SCREEN
================================================================ */
function showFrameSwitch(newFrameKey){
    G.isJunction = false;
    const currentFrame = FRAMES[G.p.frame];
    const newFrame = FRAMES[newFrameKey];

    // Populate current frame
    document.getElementById('fs-current-name').textContent = currentFrame.name;
    document.getElementById('fs-current-abilities').innerHTML = '';
    currentFrame.abilities.forEach(ab => {
        const row = document.createElement('div');
        row.className = 'fs-ab-row';
        row.innerHTML = `<span class="fs-ab-name">${ab.name}</span><span class="fs-ab-cost">[${ab.cost} AP]</span>`;
        row.onmouseenter = (e) => showTooltip(ab, e);
        row.onmouseleave = hideTooltip;
        document.getElementById('fs-current-abilities').appendChild(row);
    });

    // Populate new frame
    document.getElementById('fs-new-name').textContent = newFrame.name;
    document.getElementById('fs-new-abilities').innerHTML = '';
    newFrame.abilities.forEach(ab => {
        const row = document.createElement('div');
        row.className = 'fs-ab-row';
        row.innerHTML = `<span class="fs-ab-name">${ab.name}</span><span class="fs-ab-cost">[${ab.cost} AP]</span>`;
        row.onmouseenter = (e) => showTooltip(ab, e);
        row.onmouseleave = hideTooltip;
        document.getElementById('fs-new-abilities').appendChild(row);
    });

    // Keep button
    document.getElementById('fs-keep-btn').onclick = () => {
        document.getElementById('frame-switch-screen').classList.remove('active');
        
        // Navigate to the planet we stored when starting the junction
        if(G.nextDestination){
            navigateTo({type:'planet', id:G.nextDestination});
            G.nextDestination = null;
        }
    };

    // Switch button
    document.getElementById('fs-switch-btn').onclick = () => {
        G.p.frame = newFrameKey;
        G.p.frameName = newFrame.name;
        G.p.maxHp = newFrame.maxHp;
        G.p.hp = newFrame.maxHp;
        G.p.maxEnergy = newFrame.maxEnergy;
        G.p.energy = newFrame.maxEnergy;
        document.getElementById('frame-name').textContent = newFrame.name;
        updateAbilityButtons();
        
        document.getElementById('frame-switch-screen').classList.remove('active');
        
        // Navigate to the planet we stored when starting the junction
        if(G.nextDestination){
            navigateTo({type:'planet', id:G.nextDestination});
            G.nextDestination = null;
        }
    };

    document.getElementById('frame-switch-screen').classList.add('active');
}

function showTooltip(ability, e){
    const tooltip = document.getElementById('fs-tooltip');
    let html = `<div class="fs-tooltip-label">${ability.name}</div>`;
    html += `<div class="fs-tooltip-stat">Cost: ${ability.cost} AP</div>`;
    if(ability.dmg){
        html += `<div class="fs-tooltip-dmg">Damage: ${ability.dmg[0]}-${ability.dmg[1]} ${ability.type}</div>`;
    }
    if(ability.dur){
        html += `<div class="fs-tooltip-dur">Duration: ${ability.dur} turns</div>`;
    }
    html += `<div class="fs-tooltip-stat">${ability.desc}</div>`;
    tooltip.innerHTML = html;
    
    const row = e.currentTarget;
    const rect = row.getBoundingClientRect();
    const screenRect = document.getElementById('frame-switch-screen').getBoundingClientRect();
    
    // Position relative to the frame-switch-screen container
    const relativeLeft = rect.left - screenRect.left;
    const relativeTop = rect.top - screenRect.top;
    
    // Check if we should show on left or right side
    const showOnLeft = relativeLeft > 300; // If in right panel, show tooltip on left
    
    if(showOnLeft){
        tooltip.style.left = (relativeLeft - 160) + 'px'; // 160px = tooltip width + margin
    } else {
        tooltip.style.left = (relativeLeft + rect.width + 10) + 'px';
    }
    tooltip.style.top = relativeTop + 'px';
    tooltip.classList.add('active');
}

function hideTooltip(){
    document.getElementById('fs-tooltip').classList.remove('active');
}

/* ================================================================
   STAR CHART SCREEN
================================================================ */
function showStarChart(options){
    const container = document.getElementById('sc-panels-container');
    container.innerHTML = '';
    
    // Helper to generate faction display
    function getFactionHTML(planet){
        if(planet.mixedFactions){
            // Multiple factions
            const names = planet.mixedFactions.map(f => FACTIONS[f].name).join(' & ');
            const icons = planet.mixedFactions.map(f => FACTIONS[f].icon).join(' ');
            return {name: names, icon: icons};
        } else {
            // Single faction
            return {name: FACTIONS[planet.faction].name, icon: FACTIONS[planet.faction].icon};
        }
    }

    if(options.length === 1){
        // Single path
        const opt = options[0];
        let targetPlanet;
        if(opt.type === 'junction'){
            targetPlanet = PLANETS[JUNCTIONS[opt.id].planet];
        } else {
            targetPlanet = PLANETS[opt.id];
        }

        const panel = document.createElement('div');
        panel.className = 'sc-panel single';
        const factionDisplay = getFactionHTML(targetPlanet);
        panel.innerHTML = `
            <div class="sc-planet-icon">${targetPlanet.planetIcon}</div>
            <div class="sc-planet-name">${targetPlanet.name}</div>
            <div class="sc-faction">${factionDisplay.name}</div>
            <div class="sc-faction-icon">${factionDisplay.icon}</div>
            <div class="sc-desc">${targetPlanet.desc.replace(/\n/g,'<br>')}</div>
            <button class="sc-proceed">PROCEED ▶</button>
        `;
        panel.querySelector('.sc-proceed').onclick = () => {
            document.getElementById('star-chart-screen').classList.remove('active');
            navigateTo(opt);
        };
        container.appendChild(panel);
    } else {
        // Choice between two
        options.forEach(opt => {
            let targetPlanet;
            if(opt.type === 'junction'){
                targetPlanet = PLANETS[JUNCTIONS[opt.id].planet];
            } else {
                targetPlanet = PLANETS[opt.id];
            }

            const panel = document.createElement('div');
            panel.className = 'sc-panel';
            const factionDisplay = getFactionHTML(targetPlanet);
            panel.innerHTML = `
                <div class="sc-planet-icon">${targetPlanet.planetIcon}</div>
                <div class="sc-planet-name">${targetPlanet.name}</div>
                <div class="sc-faction">${factionDisplay.name}</div>
                <div class="sc-faction-icon">${factionDisplay.icon}</div>
                <div class="sc-desc">${targetPlanet.desc.replace(/\n/g,'<br>')}</div>
            `;
            panel.onclick = () => {
                document.getElementById('star-chart-screen').classList.remove('active');
                navigateTo(opt);
            };
            container.appendChild(panel);
        });
    }

    document.getElementById('star-chart-screen').classList.add('active');
}

function navigateTo(option){
    if(option.type === 'junction'){
        const junc = JUNCTIONS[option.id];
        // Store where we're going after this junction
        G.nextDestination = junc.planet;
        startJunctionFight(junc.frame);
    } else {
        G.currentPlanet = option.id;
        G.planetData = PLANETS[option.id];
        G.encounters = genEncounters();
        G.encIdx = 0;
        G.p.debuffEnemy = false;
        G.p.energy = G.p.maxEnergy; // Restore energy when starting new planet
        document.getElementById('node-label').textContent = `${G.planetData.name} // ${G.planetData.node}`;
        startEncounter();
    }
}

function updateAbilityButtons(){
    const frameData = FRAMES[G.p.frame];
    const abilities = frameData.abilities;

    const buttonMap = ['btn-s1','btn-s2','btn-s3','btn-s4'];

/* ================================================================
   RENDER
================================================================ */
function render(){
    const {p,e}=G; if(!e) return;
    document.getElementById('enemy-name').textContent=e.name;
    document.getElementById('enemy-hp-bar').style.width=(e.hp/e.maxHp*100)+'%';
    document.getElementById('enemy-hp-val').textContent=`${e.hp} / ${e.maxHp}`;
    let es=''; 
    if(e.fx && e.fx.includes('blinded')) es+=`[BLINDED:${e.blindLeft}t] `; 
    if(e.bracing) es+='[BRACING] ';
    if(e.decoyActive) es+=`[DECOY:${e.decoyTurns}t] `;
    if(e.invisible) es+=`[INVIS:${e.invisTurns}t] `;
    if(e.disarmed) es+=`[DISARMED:${e.disarmTurns}t] `;
    if(e.spores) es+=`[SPORES:${e.sporeTurns}t] `;
    if(e.phased) es+='[PHASED] ';
    if(e.frenzied) es+=`[FRENZIED:${e.frenzyTurns}t] `;
    document.getElementById('enemy-status').textContent=es;
    document.getElementById('player-hp-bar').style.width=(p.hp/p.maxHp*100)+'%';
    document.getElementById('player-hp-val').textContent=`${p.hp} / ${p.maxHp}`;
    document.getElementById('player-en-bar').style.width=(p.energy/p.maxEnergy*100)+'%';
    document.getElementById('player-en-val').textContent=`${p.energy} / ${p.maxEnergy}`;

    const costs = {attack:1};
    const frameData = FRAMES[G.p.frame];
    frameData.abilities.forEach(ab => { costs[ab.key] = ab.cost; });

    const ids = {attack:'btn-atk', ab1:'btn-s1', ab2:'btn-s2', ab3:'btn-s3', ab4:'btn-s4'};
    for(const [k,id] of Object.entries(ids)) {
        const cost = costs[k] || 99;
        document.getElementById(id).disabled=p.energy<cost||G.whose!=='player';
    }
    document.getElementById('btn-end').disabled=G.whose!=='player';
    const canAct = G.whose==='player' && Object.keys(costs).some(k=>p.energy>=costs[k]);
    document.getElementById('btn-end').classList.toggle('urgent', G.whose==='player' && !canAct);
}

function updateTurnBadge(){
    const el=document.getElementById('turn-indicator');
    if(G.whose==='player'){ el.textContent='PLAYER TURN'; el.className=''; }
    else { el.textContent='ENEMY TURN'; el.className='enemy'; }
}

function setButtons(on){
    ['btn-atk','btn-s1','btn-s2','btn-s3','btn-s4','btn-end'].forEach(id=>{ document.getElementById(id).disabled=!on; });
}

   PIXEL ART SPRITES

/* ================================================================
   CHARACTER SELECT
================================================================ */
// All frames that exist in the game (in unlock order preference)
const ALL_FRAMES = ['excalibur', 'volt', 'loki', 'valkyr', 'frost', 'xaku', 'saryn', 'gyre', 'protea', 'qorvex', 'lavos'];

let selectedFrameIndex = 0;

function showCharacterSelect(){
    const screen = document.getElementById('character-select-screen');
    screen.classList.add('active');
    
    // Add event listener for unlock override toggle
    document.getElementById('cs-unlock-all').onchange = () => {
        updateCharacterDisplay();
    };
    
    updateCharacterDisplay();
    
    document.getElementById('cs-arrow-left').onclick = () => {
        if(selectedFrameIndex > 0){
            selectedFrameIndex--;
            updateCharacterDisplay();
        }
    };
    
    document.getElementById('cs-arrow-right').onclick = () => {
        if(selectedFrameIndex < ALL_FRAMES.length - 1){
            selectedFrameIndex++;
            updateCharacterDisplay();
        }
    };
    
    document.getElementById('cs-select-btn').onclick = () => {
        const selectedFrame = ALL_FRAMES[selectedFrameIndex];
        const unlockOverride = document.getElementById('cs-unlock-all').checked;
        if(UNLOCKED_FRAMES.includes(selectedFrame) || unlockOverride){
            screen.classList.remove('active');
            startGameWithFrame(selectedFrame);
        }
    };
}

function updateCharacterDisplay(){
    const frameKey = ALL_FRAMES[selectedFrameIndex];
    const frameData = FRAMES[frameKey];
    const unlockOverride = document.getElementById('cs-unlock-all').checked;
    const isLocked = !UNLOCKED_FRAMES.includes(frameKey) && !unlockOverride;
    
    // Update main frame display
    document.getElementById('cs-frame-name').textContent = frameData.name;
    document.getElementById('cs-frame-sprite').textContent = '🎭'; // Placeholder
    
    const mainSprite = document.getElementById('cs-frame-sprite');
    const mainName = document.getElementById('cs-frame-name');
    const selectBtn = document.getElementById('cs-select-btn');
    
    if(isLocked){
        mainSprite.classList.add('locked');
        mainName.classList.add('locked');
        selectBtn.disabled = true;
    } else {
        mainSprite.classList.remove('locked');
        mainName.classList.remove('locked');
        selectBtn.disabled = false;
    }
    
    // Update side frames
    const leftFrame = document.getElementById('cs-frame-left');
    const rightFrame = document.getElementById('cs-frame-right');
    
    if(selectedFrameIndex > 0){
        leftFrame.classList.remove('hidden');
        leftFrame.querySelector('.cs-frame-sprite-side').textContent = '🎭';
    } else {
        leftFrame.classList.add('hidden');
    }
    
    if(selectedFrameIndex < ALL_FRAMES.length - 1){
        rightFrame.classList.remove('hidden');
        rightFrame.querySelector('.cs-frame-sprite-side').textContent = '🎭';
    } else {
        rightFrame.classList.add('hidden');
    }
    
    // Update abilities list - compact format
    const abilitiesList = document.getElementById('cs-abilities-list');
    abilitiesList.innerHTML = '';
    
    frameData.abilities.forEach(ab => {
        const row = document.createElement('div');
        row.className = 'cs-ability-row';
        
        const left = document.createElement('div');
        left.className = 'cs-ability-left';
        left.innerHTML = `
            <div class="cs-ability-name">${ab.name}</div>
            <div class="cs-ability-desc">${ab.desc}</div>
        `;
        
        const right = document.createElement('div');
        right.className = 'cs-ability-right';
        
        let rightHTML = `<span class="cs-ability-cost">${ab.cost} AP</span>`;
        
        if(ab.dmg){
            rightHTML += `<span class="cs-ability-dmg">${ab.dmg[0]}-${ab.dmg[1]} ${ab.type}</span>`;
        }
        
        if(ab.dur){
            rightHTML += `<span class="cs-ability-dur">${ab.dur}T</span>`;
        }
        
        right.innerHTML = rightHTML;
        
        row.appendChild(left);
        row.appendChild(right);
        abilitiesList.appendChild(row);
    });
    
    // Update arrow states
    document.getElementById('cs-arrow-left').disabled = selectedFrameIndex === 0;
    document.getElementById('cs-arrow-right').disabled = selectedFrameIndex === ALL_FRAMES.length - 1;
}

function startGameWithFrame(frameKey){
    const frameData = FRAMES[frameKey];
    G.p.frame = frameKey;
    G.p.frameName = frameData.name;
    G.p.maxHp = frameData.maxHp;
    G.p.hp = frameData.maxHp;
    G.p.maxEnergy = frameData.maxEnergy;
    G.p.energy = frameData.maxEnergy;
    
    document.getElementById('frame-name').textContent = frameData.name;
    document.getElementById('node-label').textContent = `${G.planetData.name} // ${G.planetData.node}`;
    
    updateAbilityButtons();
    startEncounter();
}

/* ================================================================
   INIT
================================================================ */
function startGame(){
    G=freshRun();
    selectedFrameIndex = 0; // Reset to first frame
    showCharacterSelect();
}

startGame();
