<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WARFRAME: STAR PATH</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg:         #08080f;
            --panel:      #0e0e1a;
            --border:     #c87000;
            --accent:     #00c8ff;
            --text:       #d0d0e0;
            --text-dim:   #505070;
            --hp:         #00e060;
            --energy:     #00c8ff;
            --enemy-col:  #ff4040;
            --dmg-col:    #ff8040;
            --status-col: #ff40ff;
        }

        * { margin:0; padding:0; box-sizing:border-box; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Press Start 2P', monospace;
            font-size: 8px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Scanline overlay */
        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background: repeating-linear-gradient(
                0deg, transparent, transparent 2px,
                rgba(0,0,0,0.08) 2px, rgba(0,0,0,0.08) 4px
            );
            pointer-events: none;
            z-index: 9999;
        }

        #game {
            width: 640px;
            height: 480px;
            background: var(--panel);
            border: 3px solid var(--border);
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }

        /* ── Title bar ── */
        #titlebar {
            background: var(--bg);
            border-bottom: 2px solid var(--border);
            padding: 6px 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }
        #titlebar .title { color: var(--border); font-size: 9px; letter-spacing: 2px; }
        #titlebar .node  { color: var(--accent);  font-size: 7px; }

        /* ── Enemy area ── */
        #enemy-area {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px 16px;
            gap: 20px;
            border-bottom: 2px solid #1a1a2a;
            background: linear-gradient(180deg, #08080f 0%, #0e0e1a 100%);
            position: relative;
        }

        #enemy-sprite {
            width: 80px;
            height: 80px;
            flex-shrink: 0;
            image-rendering: pixelated;
        }

        #enemy-info { flex: 1; }

        #enemy-name {
            color: var(--enemy-col);
            font-size: 9px;
            margin-bottom: 8px;
            text-shadow: 0 0 8px var(--enemy-col);
        }

        #enemy-status {
            color: var(--status-col);
            font-size: 6px;
            margin-bottom: 6px;
            min-height: 12px;
        }

        /* ── Bars ── */
        .bar-group { margin-bottom: 6px; }
        .bar-label { font-size: 6px; color: var(--text-dim); margin-bottom: 3px; }

        .bar-outer {
            height: 10px;
            background: #0a0a14;
            border: 1px solid #2a2a3a;
            overflow: hidden;
        }

        .bar-inner {
            height: 100%;
            transition: width 0.3s ease;
            position: relative;
        }
        .bar-inner::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 3px;
            background: rgba(255,255,255,0.18);
        }

        .bar-hp     .bar-inner { background: var(--hp);       box-shadow: 0 0 6px var(--hp); }
        .bar-ehp    .bar-inner { background: var(--enemy-col); box-shadow: 0 0 6px var(--enemy-col); }
        .bar-energy .bar-inner { background: var(--energy);   box-shadow: 0 0 6px var(--energy); }

        .bar-value { font-size: 6px; color: var(--text-dim); margin-top: 2px; }

        /* ── Turn indicator ── */
        #turn-indicator {
            position: absolute;
            top: 6px; right: 8px;
            font-size: 7px;
            padding: 3px 7px;
            background: var(--bg);
            border: 1px solid var(--border);
            color: var(--accent);
            transition: all 0.2s;
        }
        #turn-indicator.enemy { color: var(--enemy-col); border-color: var(--enemy-col); }

        /* ── Enemy action banner ── */
        #enemy-action {
            position: absolute;
            bottom: 8px; left: 50%;
            transform: translateX(-50%);
            font-size: 7px;
            color: var(--enemy-col);
            background: rgba(8,8,15,0.85);
            border: 1px solid var(--enemy-col);
            padding: 3px 10px;
            white-space: nowrap;
            opacity: 0;
            transition: opacity 0.25s;
            pointer-events: none;
        }
        #enemy-action.show { opacity: 1; }

        /* ── Combat log ── */
        #log-area {
            height: 80px;
            overflow-y: auto;
            padding: 6px 10px;
            background: var(--bg);
            border-bottom: 2px solid #1a1a2a;
            flex-shrink: 0;
            scrollbar-width: thin;
            scrollbar-color: var(--border) transparent;
        }
        .log-entry { font-size: 7px; line-height: 2.1; }
        .log-player { color: var(--accent); }
        .log-enemy  { color: var(--enemy-col); }
        .log-system { color: var(--border); }
        .log-damage { color: var(--dmg-col); }
        .log-status { color: var(--status-col); }

        /* ── Player area ── */
        #player-area {
            padding: 8px 10px 10px;
            flex-shrink: 0;
        }

        #player-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        #frame-name {
            color: var(--accent);
            font-size: 9px;
            text-shadow: 0 0 8px var(--accent);
        }
        #player-status { color: var(--status-col); font-size: 6px; }

        #player-bars {
            display: flex;
            gap: 16px;
            margin-bottom: 8px;
        }
        #player-bars .bar-group { flex: 1; }

        /* ── Action buttons ── */
        #actions {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
        }

        .btn {
            background: var(--bg);
            border: 2px solid var(--border);
            color: var(--text);
            font-family: 'Press Start 2P', monospace;
            font-size: 6px;
            padding: 5px 6px;
            cursor: pointer;
            line-height: 1.6;
            flex: 1;
            min-width: 90px;
            text-align: center;
            transition: background 0.1s, color 0.1s, box-shadow 0.1s;
        }
        .btn:hover:not(:disabled) {
            background: var(--border);
            color: var(--bg);
            box-shadow: 0 0 8px var(--border);
        }
        .btn:active:not(:disabled) { transform: translateY(1px); }
        .btn:disabled { opacity: 0.28; cursor: not-allowed; border-color: #2a2a3a; }

        .btn.ability {
            border-color: var(--accent);
        }
        .btn.ability:hover:not(:disabled) {
            background: var(--accent);
            color: var(--bg);
            box-shadow: 0 0 8px var(--accent);
        }

        .btn.end {
            border-color: #505070;
            flex: 0 0 auto;
            min-width: auto;
            padding: 5px 12px;
            color: #505070;
        }
        .btn.end:hover:not(:disabled) {
            background: #505070;
            color: var(--bg);
            box-shadow: none;
        }

        /* ── Damage popup ── */
        .dmg-popup {
            position: absolute;
            font-size: 11px;
            pointer-events: none;
            animation: floatUp 0.9s ease-out forwards;
            z-index: 200;
            text-shadow: 2px 2px 0 #000;
        }
        @keyframes floatUp {
            0%   { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-36px); }
        }

        /* ── Flash effects ── */
        @keyframes flashRed {
            0%,100% { filter: none; }
            40%     { filter: brightness(2) sepia(1) hue-rotate(300deg); }
        }
        @keyframes flashBlue {
            0%,100% { filter: none; }
            40%     { filter: brightness(2.5) saturate(3) hue-rotate(160deg); }
        }
        .flash-hit     { animation: flashRed  0.3s; }
        .flash-ability { animation: flashBlue 0.3s; }

        /* ── Overlay ── */
        .overlay {
            position: absolute;
            inset: 0;
            background: rgba(8,8,15,0.93);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 500;
        }
        .overlay h2    { font-size: 16px; margin-bottom: 16px; }
        .overlay.win h2  { color: var(--border); text-shadow: 0 0 16px var(--border); }
        .overlay.lose h2 { color: var(--enemy-col); text-shadow: 0 0 16px var(--enemy-col); }
        .overlay p     { font-size: 7px; color: var(--text-dim); line-height: 2.4; text-align: center; margin-bottom: 4px; }
        .overlay .obtn {
            margin-top: 16px;
            background: var(--bg);
            border: 2px solid var(--border);
            color: var(--border);
            font-family: 'Press Start 2P', monospace;
            font-size: 8px;
            padding: 8px 18px;
            cursor: pointer;
        }
        .overlay .obtn:hover { background: var(--border); color: var(--bg); }
    </style>
</head>
<body>
<div id="game">

    <!-- Title bar -->
    <div id="titlebar">
        <span class="title">WARFRAME: STAR PATH</span>
        <span class="node" id="node-label">EARTH // E PRIME</span>
    </div>

    <!-- Enemy area -->
    <div id="enemy-area">
        <div id="turn-indicator">PLAYER TURN</div>
        <canvas id="enemy-sprite" width="80" height="80"></canvas>
        <div id="enemy-info">
            <div id="enemy-name">—</div>
            <div id="enemy-status"></div>
            <div class="bar-group bar-ehp">
                <div class="bar-label">HEALTH</div>
                <div class="bar-outer">
                    <div class="bar-inner" id="enemy-hp-bar" style="width:100%"></div>
                </div>
                <div class="bar-value" id="enemy-hp-val">— / —</div>
            </div>
        </div>
        <div id="enemy-action"></div>
    </div>

    <!-- Combat log -->
    <div id="log-area"></div>

    <!-- Player area -->
    <div id="player-area">
        <div id="player-header">
            <span id="frame-name">EXCALIBUR</span>
            <span id="player-status"></span>
        </div>
        <div id="player-bars">
            <div class="bar-group bar-hp">
                <div class="bar-label">HEALTH</div>
                <div class="bar-outer">
                    <div class="bar-inner" id="player-hp-bar" style="width:100%"></div>
                </div>
                <div class="bar-value" id="player-hp-val">150 / 150</div>
            </div>
            <div class="bar-group bar-energy">
                <div class="bar-label">ENERGY  [ ACTION POINTS ]</div>
                <div class="bar-outer">
                    <div class="bar-inner" id="player-en-bar" style="width:100%"></div>
                </div>
                <div class="bar-value" id="player-en-val">8 / 8</div>
            </div>
        </div>
        <div id="actions">
            <button class="btn" id="btn-atk"    onclick="act('attack')">⚔ ATTACK<br>[1 AP]</button>
            <button class="btn ability" id="btn-s1" onclick="act('slash_dash')">① SLASH DASH<br>[2 AP]</button>
            <button class="btn ability" id="btn-s2" onclick="act('radial_blind')">② RADIAL BLIND<br>[3 AP]</button>
            <button class="btn ability" id="btn-s3" onclick="act('radial_javelin')">③ RADIAL JAVELIN<br>[4 AP]</button>
            <button class="btn ability" id="btn-s4" onclick="act('exalted_blade')">④ EXALTED BLADE<br>[5 AP]</button>
            <button class="btn end"     id="btn-end"   onclick="endTurn()">END TURN ▶</button>
        </div>
    </div>

</div>

<script>
/* ================================================================
   DATA
================================================================ */

const ENEMY_TYPES = {
    grineer_lancer: {
        name: 'GRINEER LANCER',
        maxHp: 60, def: 0.05,
        atk: 12, sprite: 'lancer',
        ai: [{t:'attack',w:3},{t:'brace',w:1}]
    },
    heavy_gunner: {
        name: 'HEAVY GUNNER',
        maxHp: 110, def: 0.20,
        atk: 18, sprite: 'heavy',
        ai: [{t:'attack',w:2},{t:'suppress',w:1},{t:'brace',w:1}]
    },
    grineer_bombard: {
        name: 'GRINEER BOMBARD',
        maxHp: 75, def: 0.0,
        atk: 26, sprite: 'bombard',
        ai: [{t:'rocket',w:2},{t:'attack',w:1}]
    }
};

const ABILITIES = {
    attack: {
        cost: 1,
        run(s) {
            const d = roll(14, 20);
            log('log-player', `${s.p.frame} fires their weapon!`);
            return hitEnemy(s, d, 'PHYSICAL', false);
        }
    },
    slash_dash: {
        cost: 2,
        run(s) {
            const d = roll(24, 32);
            log('log-player', `${s.p.frame} SLASH DASHES through the enemy!`);
            return hitEnemy(s, d, 'SLASH', true);
        }
    },
    radial_blind: {
        cost: 3,
        run(s) {
            log('log-player', `${s.p.frame} releases a blinding radial pulse!`);
            flash('enemy-sprite', 'flash-ability');
            if (!s.e.fx.includes('blinded')) {
                s.e.fx.push('blinded');
            }
            s.e.blindLeft = 2;
            log('log-status', `${s.e.name} is BLINDED for 2 turns! Attacks may miss.`);
            return s;
        }
    },
    radial_javelin: {
        cost: 4,
        run(s) {
            const d = roll(38, 50);
            log('log-player', `${s.p.frame} hurls energy javelins! (armor pierce)`);
            flash('enemy-sprite', 'flash-ability');
            return hitEnemy(s, d, 'PUNCTURE', true);
        }
    },
    exalted_blade: {
        cost: 5,
        run(s) {
            const d = roll(55, 70);
            log('log-player', `${s.p.frame} summons the EXALTED BLADE!`);
            flash('enemy-sprite', 'flash-ability');
            return hitEnemy(s, d, 'ENERGY', true);
        }
    }
};

const ENEMY_AI = {
    attack(s) {
        if (s.e.fx.includes('blinded') && Math.random() < 0.60) {
            log('log-enemy', `${s.e.name} attacks wildly — MISS!`);
            return s;
        }
        const d = roll(Math.floor(s.e.atk * 0.8), Math.floor(s.e.atk * 1.2));
        log('log-enemy', `${s.e.name} attacks for ${d} damage!`);
        return hitPlayer(s, d);
    },
    brace(s) {
        s.e.bracing = true;
        log('log-enemy', `${s.e.name} braces! Incoming damage halved this hit.`);
        return s;
    },
    suppress(s) {
        if (s.e.fx.includes('blinded') && Math.random() < 0.55) {
            log('log-enemy', `${s.e.name} fires blindly — MISS!`);
            return s;
        }
        const d = roll(Math.floor(s.e.atk * 0.6), Math.floor(s.e.atk * 0.85));
        log('log-enemy', `${s.e.name} lays down suppressing fire! ${d} dmg + 2 AP drain!`);
        s = hitPlayer(s, d);
        s.p.energy = Math.max(0, s.p.energy - 2);
        return s;
    },
    rocket(s) {
        if (s.e.fx.includes('blinded') && Math.random() < 0.35) {
            log('log-enemy', `${s.e.name} fires a rocket — it veers off course! MISS!`);
            return s;
        }
        const d = roll(Math.floor(s.e.atk * 1.2), Math.floor(s.e.atk * 1.65));
        log('log-enemy', `${s.e.name} fires a ROCKET! ${d} blast damage!`);
        return hitPlayer(s, d);
    }
};

/* ================================================================
   STATE
================================================================ */

let G = {}; // global game state

function freshState() {
    const keys = Object.keys(ENEMY_TYPES);
    const tmpl = ENEMY_TYPES[keys[Math.floor(Math.random() * keys.length)]];
    return {
        p: {
            frame: 'EXCALIBUR',
            hp: 150, maxHp: 150,
            energy: 8, maxEnergy: 8,
            fx: []
        },
        e: {
            ...JSON.parse(JSON.stringify(tmpl)),
            hp: tmpl.maxHp,
            fx: [], bracing: false, blindLeft: 0
        },
        whose: 'player',
        phase: 'combat',
        turn: 1
    };
}

/* ================================================================
   COMBAT HELPERS
================================================================ */

function roll(a, b) { return Math.floor(Math.random() * (b - a + 1)) + a; }

function hitEnemy(s, raw, type, pierce) {
    let d = raw;
    if (s.e.bracing) {
        d = Math.floor(d * 0.5);
        s.e.bracing = false;
        log('log-status', `${s.e.name} was bracing! Damage halved to ${d}.`);
    } else if (!pierce) {
        d = Math.floor(d * (1 - s.e.def));
    }
    s.e.hp = Math.max(0, s.e.hp - d);
    log('log-damage', `→ ${d} ${type} dmg to ${s.e.name}  [${s.e.hp}/${s.e.maxHp} HP]`);
    popup(d, '#ff8040', 'enemy-area');
    flash('enemy-sprite', 'flash-hit');
    return s;
}

function hitPlayer(s, d) {
    s.p.hp = Math.max(0, s.p.hp - d);
    log('log-damage', `→ ${d} dmg to ${s.p.frame}  [${s.p.hp}/${s.p.maxHp} HP]`);
    popup(d, '#ff4040', 'player-area');
    flash('game', 'flash-hit');
    return s;
}

function pickAI(e) {
    const pool = e.ai;
    const total = pool.reduce((n, a) => n + a.w, 0);
    let r = Math.random() * total;
    for (const a of pool) {
        r -= a.w;
        if (r <= 0) return a.t;
    }
    return pool[0].t;
}

/* ================================================================
   TURN FLOW
================================================================ */

function act(key) {
    if (G.whose !== 'player' || G.phase !== 'combat') return;
    const ab = ABILITIES[key];
    if (!ab) return;
    if (G.p.energy < ab.cost) {
        log('log-system', `Not enough energy! Need ${ab.cost} AP.`);
        return;
    }
    G.p.energy -= ab.cost;
    G = ab.run(G);
    render();
    if (G.e.hp <= 0) { setTimeout(showWin, 420); return; }
}

function endTurn() {
    if (G.whose !== 'player' || G.phase !== 'combat') return;
    log('log-system', `── End of player turn ──`);
    G.whose = 'enemy';
    setButtons(false);
    updateTurnBadge();
    setTimeout(doEnemyTurn, 700);
}

function doEnemyTurn() {
    if (G.phase !== 'combat') return;

    // Tick blind
    if (G.e.fx.includes('blinded')) {
        G.e.blindLeft--;
        if (G.e.blindLeft <= 0) {
            G.e.fx = G.e.fx.filter(f => f !== 'blinded');
            log('log-status', `${G.e.name} is no longer blinded.`);
        }
    }

    // Stunned check
    if (G.e.fx.includes('stunned')) {
        log('log-status', `${G.e.name} is STUNNED and skips their turn!`);
        G.e.fx = G.e.fx.filter(f => f !== 'stunned');
        render();
        setTimeout(startPlayerTurn, 500);
        return;
    }

    const chosen = pickAI(G.e);
    showEnemyBanner(chosen);
    G = ENEMY_AI[chosen](G);
    render();

    if (G.p.hp <= 0) { setTimeout(showLose, 420); return; }
    setTimeout(startPlayerTurn, 650);
}

function startPlayerTurn() {
    G.whose = 'player';
    G.turn++;
    G.p.energy = G.p.maxEnergy;
    log('log-system', `══ TURN ${G.turn}  —  Energy restored ══`);
    render();
    setButtons(true);
    updateTurnBadge();
}

/* ================================================================
   RENDER
================================================================ */

function render() {
    const {p, e} = G;

    // Enemy
    document.getElementById('enemy-name').textContent = e.name;
    document.getElementById('enemy-hp-bar').style.width = (e.hp / e.maxHp * 100) + '%';
    document.getElementById('enemy-hp-val').textContent = `${e.hp} / ${e.maxHp}`;
    let es = '';
    if (e.fx.includes('blinded')) es += `[BLINDED:${e.blindLeft}t] `;
    if (e.bracing) es += `[BRACING] `;
    document.getElementById('enemy-status').textContent = es;

    // Player
    document.getElementById('player-hp-bar').style.width = (p.hp / p.maxHp * 100) + '%';
    document.getElementById('player-hp-val').textContent = `${p.hp} / ${p.maxHp}`;
    document.getElementById('player-en-bar').style.width  = (p.energy / p.maxEnergy * 100) + '%';
    document.getElementById('player-en-val').textContent  = `${p.energy} / ${p.maxEnergy}`;

    // Button states
    const costs = {attack:1, slash_dash:2, radial_blind:3, radial_javelin:4, exalted_blade:5};
    const ids   = {attack:'btn-atk', slash_dash:'btn-s1', radial_blind:'btn-s2', radial_javelin:'btn-s3', exalted_blade:'btn-s4'};
    for (const [k,id] of Object.entries(ids)) {
        document.getElementById(id).disabled = p.energy < costs[k] || G.whose !== 'player';
    }
    document.getElementById('btn-end').disabled = G.whose !== 'player';
}

function updateTurnBadge() {
    const el = document.getElementById('turn-indicator');
    if (G.whose === 'player') {
        el.textContent = 'PLAYER TURN';
        el.className = '';
    } else {
        el.textContent = 'ENEMY TURN';
        el.className = 'enemy';
    }
}

function setButtons(on) {
    ['btn-atk','btn-s1','btn-s2','btn-s3','btn-s4','btn-end'].forEach(id => {
        document.getElementById(id).disabled = !on;
    });
}

function showEnemyBanner(type) {
    const labels = {attack:'⚔ ATTACKING!', brace:'🛡 BRACING!', suppress:'🔫 SUPPRESSING FIRE!', rocket:'🚀 ROCKET INCOMING!'};
    const el = document.getElementById('enemy-action');
    el.textContent = labels[type] || type.toUpperCase() + '!';
    el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), 1300);
}

/* ================================================================
   PIXEL ART SPRITES  (16×16 grid, scale 5)
================================================================ */

function drawSprite(type) {
    const canvas = document.getElementById('enemy-sprite');
    const ctx    = canvas.getContext('2d');
    const S = 5;
    ctx.imageSmoothingEnabled = false;
    ctx.clearRect(0, 0, 80, 80);

    // Each entry: [row, col, hex]
    const LANCER = [
        // helmet
        [1,6,'#c87000'],[1,7,'#c87000'],[1,8,'#c87000'],[1,9,'#c87000'],
        [2,5,'#7a4010'],[2,6,'#c87000'],[2,7,'#c87000'],[2,8,'#c87000'],[2,9,'#c87000'],[2,10,'#7a4010'],

/* ================================================================
   UI HELPERS
================================================================ */

function log(cls, msg) {
    const area = document.getElementById('log-area');
    const d = document.createElement('div');
    d.className = `log-entry ${cls}`;
    d.textContent = '> ' + msg;
    area.appendChild(d);
    area.scrollTop = area.scrollHeight;
}

function popup(dmg, color, parentId) {
    const parent = document.getElementById(parentId);
    const el = document.createElement('div');
    el.className = 'dmg-popup';
    el.textContent = '-' + dmg;
    el.style.color = color;
    el.style.left   = (15 + Math.random() * 40) + '%';
    el.style.top    = '25%';
    parent.appendChild(el);
    setTimeout(() => el.remove(), 950);
}

function flash(id, cls) {
    const el = document.getElementById(id);
    if (!el) return;
    el.classList.add(cls);
    setTimeout(() => el.classList.remove(cls), 320);
}

/* ================================================================
   GAME OVER SCREENS
================================================================ */

function showWin() {
    G.phase = 'over';
    const ov = document.createElement('div');
    ov.className = 'overlay win';
    ov.innerHTML = `
        <h2>MISSION COMPLETE</h2>
        <p>${G.e.name} eliminated.<br><br>
        HP remaining: ${G.p.hp} / ${G.p.maxHp}<br>
        Turns taken: ${G.turn}</p>
        <button class="obtn" id="next-btn">NEXT ENCOUNTER ▶</button>`;
    document.getElementById('game').appendChild(ov);
    document.getElementById('next-btn').onclick = () => { ov.remove(); startGame(); };
}

function showLose() {
    G.phase = 'over';
    const ov = document.createElement('div');
    ov.className = 'overlay lose';
    ov.innerHTML = `
        <h2>MISSION FAILED</h2>
        <p>${G.p.frame} has fallen, Tenno.<br><br>
        The Lotus mourns your loss.</p>
        <button class="obtn" id="retry-btn">TRY AGAIN ▶</button>`;
    document.getElementById('game').appendChild(ov);
    document.getElementById('retry-btn').onclick = () => { ov.remove(); startGame(); };
}

/* ================================================================
   INIT
================================================================ */

function startGame() {
    G = freshState();
    document.getElementById('log-area').innerHTML = '';
    log('log-system', `══════════════════════════════`);
    log('log-system', `ENCOUNTER BEGIN  —  Turn ${G.turn}`);
    log('log-system', `A ${G.e.name} appears!`);
    log('log-system', `══════════════════════════════`);
    drawSprite(G.e.sprite);
    render();
    updateTurnBadge();
}

startGame();
